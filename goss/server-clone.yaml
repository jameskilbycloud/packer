# Goss smoke-test spec for the POST-FIRST-BOOT state of a *cloned* template.
# Used by scripts/smoke-test.sh (called by the smoke job in
# build-templates.yml) after cloning the just-built template and booting it.
#
# Almost identical to server.yaml — but the first-boot oneshots that fire on
# every clone (ssh-host-keygen, firstboot-hostname) have different post-state:
#
#   server.yaml                     server-clone.yaml (this file)
#   ─────────────────────────────   ─────────────────────────────────────────
#   ssh_host_*_key absent (wiped    ssh_host_*_key present (regenerated by
#     by setup.sh)                   ssh-host-keygen.service on first boot)
#   ssh-host-keygen.service         ssh-host-keygen.service disabled (it
#     enabled (queued to fire)       ran on first boot then self-disabled)
#   firstboot-hostname.service      firstboot-hostname.service disabled
#     enabled                        (same pattern)
#   (no firstboot done sentinel)    /var/lib/packer-firstboot/hostname.done
#                                    exists (touched by firstboot-hostname.sh)
#
# Everything else is identical to server.yaml. Kept as a full duplicate
# rather than a `gossfile: ./server.yaml` include with overrides because
# goss's behaviour on duplicate keys across includes isn't well-documented.
# When you add an assertion to one spec, mirror it in the other.
#
# Variables (passed via --vars-inline by scripts/goss-validate.sh):
#   build_username — the OS user created by autoinstall (defaults to `ubuntu`)
# Goss reference: https://github.com/goss-org/goss/blob/master/docs/manual.md

file:
  # Sudoers entry for the build user — REMOVED by finalize.sh. Clones
  # should require the user's password for sudo, not get NOPASSWD.
  /etc/sudoers.d/90-packer-{{ .Vars.build_username }}:
    exists: false

  # SSH password-auth drop-in — REMOVED by finalize.sh. Clones should
  # use the distro default (PasswordAuthentication no on Ubuntu 22.04+).
  /etc/ssh/sshd_config.d/10-packer-pwauth.conf:
    exists: false

  # Cloud-init neutralisation: datasource_list pinned to None on every clone.
  /etc/cloud/cloud.cfg.d/99-packer.cfg:
    exists: true
    contains:
      - "datasource_list:"
      - "None"

  # SSH hardening drop-in.
  /etc/ssh/sshd_config.d/99-packer-hardening.conf:
    exists: true
    contains:
      - "PermitRootLogin no"
      - "X11Forwarding no"

  # sysctl tunings.
  /etc/sysctl.d/99-packer.conf:
    exists: true
    contains:
      - "vm.swappiness"

  # First-boot SSH host-key regen unit must still exist on disk (it ran and
  # self-disabled, but the unit file persists).
  /etc/systemd/system/ssh-host-keygen.service:
    exists: true
    contains:
      - "ssh-keygen -A"
      - "ConditionPathExists=!/etc/ssh/ssh_host_rsa_key"
      - "After=systemd-remount-fs.service"

  # First-boot hostname uniquification unit + script — same pattern.
  /etc/systemd/system/firstboot-hostname.service:
    exists: true
    contains:
      - "ConditionPathExists=!/var/lib/packer-firstboot/hostname.done"
      - "After=systemd-remount-fs.service"
  /usr/local/sbin/firstboot-hostname.sh:
    exists: true
    mode: "0755"

  # Build-metadata snapshots written into the template.
  /var/log/packer-build-info.json:
    exists: true
  /var/log/packer-package-list.txt:
    exists: true

  # SSH host keys present — regenerated by ssh-host-keygen.service on first
  # boot. This is the inverse of server.yaml's assertion.
  /etc/ssh/ssh_host_rsa_key:
    exists: true
  /etc/ssh/ssh_host_ed25519_key:
    exists: true

  # Sentinel created by firstboot-hostname.sh after it sets a unique
  # hostname and disables itself. Its existence is what gates the unit's
  # ConditionPathExists, preventing it from firing again on subsequent boots.
  /var/lib/packer-firstboot/hostname.done:
    exists: true

  # UFW unit must be masked (symlink to /dev/null) so first-boot doesn't
  # block port 22.
  /etc/systemd/system/ufw.service:
    exists: true
    filetype: symlink

service:
  # open-vm-tools enabled and running so vSphere Tools status reports OK.
  open-vm-tools:
    enabled: true
    running: true

  # First-boot oneshots are DISABLED post-clone-boot — they ran once and
  # called `systemctl disable` on themselves so they don't fire again.
  ssh-host-keygen.service:
    enabled: false
  firstboot-hostname.service:
    enabled: false

package:
  # Common utilities installed by setup.sh.
  curl:
    installed: true
  vim:
    installed: true
  git:
    installed: true
  open-vm-tools:
    installed: true

command:
  # SSH availability — accept either ssh.service (22.04 default) OR
  # ssh.socket (24.04+ default with socket activation) being enabled.
  ssh-unit-enabled:
    exec: "systemctl is-enabled ssh.socket 2>/dev/null | grep -q '^enabled$' || systemctl is-enabled ssh.service 2>/dev/null | grep -q '^enabled$'"
    exit-status: 0

  # ufw.service should be masked (is-enabled returns "masked" + exit 1).
  ufw-masked:
    exec: "systemctl is-enabled ufw.service"
    exit-status: 1
    stdout:
      - masked

  # No swap configured (swapon prints nothing when there's no swap).
  swap-off:
    exec: "swapon --noheadings"
    exit-status: 0
    stdout: []

  # build-info.json contains the expected keys.
  build-info-shape:
    exec: "jq -e 'has(\"kernel_version\") and has(\"os_pretty_name\") and has(\"package_count\") and has(\"captured_at\")' /var/log/packer-build-info.json || python3 -c \"import json,sys; d=json.load(open('/var/log/packer-build-info.json')); sys.exit(0 if all(k in d for k in ('kernel_version','os_pretty_name','package_count','captured_at')) else 1)\""
    exit-status: 0
