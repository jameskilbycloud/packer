# Goss smoke-test spec for Ubuntu desktop templates.
# Wraps server.yaml (everything in there must also hold for desktop builds)
# and adds desktop-specific assertions.
# Variables (passed via --vars-inline by scripts/goss-validate.sh):
#   build_username — the OS user created by autoinstall (defaults to `ubuntu`)

gossfile:
  ./server.yaml: {}

package:
  # Installed by desktop.sh.
  ubuntu-desktop-minimal:
    installed: true
  open-vm-tools-desktop:
    installed: true

service:
  # Display manager — pulled in by ubuntu-desktop-minimal. Must be enabled
  # so the GUI starts on first boot of clones.
  gdm3:
    enabled: true
