name: Upload ISOs to Content Library

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  # Manual only — run this once when setting up or when new ISOs are released
  workflow_dispatch:
    inputs:
      ubuntu_versions:
        description: "Ubuntu versions to upload (space-separated, blank for none)"
        required: false
        default: "2204 2404 2604"

      extra_isos:
        description: 'Extras catalogue (space-separated slugs, or "all", or blank). See scripts/upload-isos.sh.'
        required: false
        default: ""

      content_library:
        description: "Content Library name"
        required: false
        default: "Packer-ISOs"

      download_dir:
        description: "Runner path for ISO downloads (must have 2 GB free per ISO)"
        required: false
        default: "/var/tmp/packer-isos"

      keep_downloads:
        description: "Keep local ISO files on the runner after upload"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

      skip_checksum:
        description: "Skip SHA256 checksum verification (not recommended)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# ── Token scope ───────────────────────────────────────────────────────────────
# Read-only — upload-isos calls vSphere via govc only (using the GOVC_*
# secrets) and never touches the GitHub API beyond actions/checkout. The
# auto-dispatch flow that fires this workflow (from check-iso-updates.yml)
# uses that workflow's own write-scoped token, not this one.
permissions:
  contents: read

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:
  upload-isos:
    name: Upload ISOs to vSphere Content Library
    runs-on: ${{ vars.RUNNER_LABEL || 'self-hosted' }}
    timeout-minutes: 180              # ISOs are 1-2 GB each — allow time for download + upload

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # ── Verify required secrets are present ─────────────────────────────────
      - name: Check required secrets
        env:
          VSPHERE_SERVER:                ${{ secrets.VSPHERE_SERVER }}
          VSPHERE_USER:                  ${{ secrets.VSPHERE_USER }}
          VSPHERE_PASSWORD:              ${{ secrets.VSPHERE_PASSWORD }}
          VSPHERE_DATACENTER:            ${{ secrets.VSPHERE_DATACENTER }}
          VSPHERE_ISO_LIBRARY_DATASTORE: ${{ secrets.VSPHERE_ISO_LIBRARY_DATASTORE }}
        run: |
          missing=()

          [[ -z "${VSPHERE_SERVER}"    ]] && missing+=("VSPHERE_SERVER")
          [[ -z "${VSPHERE_USER}"      ]] && missing+=("VSPHERE_USER")
          [[ -z "${VSPHERE_PASSWORD}"  ]] && missing+=("VSPHERE_PASSWORD")
          [[ -z "${VSPHERE_DATACENTER}" ]] && missing+=("VSPHERE_DATACENTER")

          # VSPHERE_ISO_LIBRARY_DATASTORE is the datastore that backs the Content Library.
          # Check your Content Library settings in vSphere to find the backing datastore name.
          [[ -z "${VSPHERE_ISO_LIBRARY_DATASTORE}" ]] && missing+=("VSPHERE_ISO_LIBRARY_DATASTORE")

          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "❌ The following required secrets are not set:"
            for s in "${missing[@]}"; do
              echo "   • ${s}"
            done
            echo ""
            echo "Set them via: Settings → Secrets and variables → Actions"
            exit 1
          fi

          echo "✅ All required secrets are present."

      # ── Verify govc is available (idempotent, best-effort) ──────────────────
      # Best-effort auto-install. Fallback needs sudo — if it fails, the
      # downstream "Upload ISOs" step will fail with a clear "govc: command
      # not found". Pre-install per docs/operations.md to avoid relying on
      # this fallback.
      - name: Check govc
        continue-on-error: true
        run: |
          if command -v govc &>/dev/null; then
            echo "govc already installed: $(govc version)"
            exit 0
          fi
          echo "govc not installed — attempting best-effort auto-install (requires sudo)."
          echo "If this fails, pre-install per docs/operations.md → Setting up the runner."
          GOVC_VERSION=$(curl -s https://api.github.com/repos/vmware/govmomi/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4)
          curl -fsSL \
            "https://github.com/vmware/govmomi/releases/download/${GOVC_VERSION}/govc_Linux_x86_64.tar.gz" \
            | sudo tar -xzf - -C /usr/local/bin govc
          sudo chmod +x /usr/local/bin/govc
          echo "govc version: $(govc version)"

      # ── Run upload script ────────────────────────────────────────────────────
      - name: Upload ISOs
        env:
          GOVC_URL:           ${{ secrets.VSPHERE_SERVER }}
          GOVC_USERNAME:      ${{ secrets.VSPHERE_USER }}
          GOVC_PASSWORD:      ${{ secrets.VSPHERE_PASSWORD }}
          GOVC_INSECURE:      ${{ secrets.VSPHERE_INSECURE || 'false' }}
          GOVC_DATACENTER:    ${{ secrets.VSPHERE_DATACENTER }}
          LIBRARY_DATASTORE:  ${{ secrets.VSPHERE_ISO_LIBRARY_DATASTORE }}
          CONTENT_LIBRARY:    ${{ github.event.inputs.content_library }}
          UBUNTU_VERSIONS:    ${{ github.event.inputs.ubuntu_versions }}
          EXTRA_ISOS:         ${{ github.event.inputs.extra_isos }}
          KEEP_DOWNLOADS:     ${{ github.event.inputs.keep_downloads }}
          SKIP_CHECKSUM:      ${{ github.event.inputs.skip_checksum }}
          DOWNLOAD_DIR:       ${{ github.event.inputs.download_dir }}
        run: bash scripts/upload-isos.sh
