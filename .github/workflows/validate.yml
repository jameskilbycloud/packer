name: Validate

# ── Triggers ──────────────────────────────────────────────────────────────────
# Runs on every PR that touches Packer files, and on direct pushes to main.
# Uses ubuntu-latest (GitHub-hosted) — no self-hosted runner or real secrets
# needed. packer validate checks syntax and variable references only; it never
# contacts vSphere.
on:
  pull_request:
    branches:
      - main
    paths:
      - "*.pkr.hcl"
      - "templates/**"
      - "scripts/setup.sh"
      - "scripts/vmtools.sh"
      - ".github/workflows/validate.yml"

  push:
    branches:
      - main
    paths:
      - "*.pkr.hcl"
      - "templates/**"

  # Allow manual runs (useful for debugging workflow changes)
  workflow_dispatch:

# ── Concurrency ───────────────────────────────────────────────────────────────
# Cancel any in-progress validate run for the same PR/branch so stale checks
# don't block merges.
concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:
  validate:
    name: Packer fmt & validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Install Packer ───────────────────────────────────────────────────────
      - name: Install Packer
        run: |
          curl -fsSL https://apt.releases.hashicorp.com/gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) \
            signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] \
            https://apt.releases.hashicorp.com $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update -y -qq
          sudo apt-get install -y -qq packer
          packer version

      # ── Download vsphere plugin ──────────────────────────────────────────────
      - name: Packer init
        run: packer init .

      # ── Formatting check ─────────────────────────────────────────────────────
      # Fails if any .pkr.hcl file needs reformatting.
      # To auto-fix locally: packer fmt .
      - name: Check formatting
        run: |
          packer fmt -check -diff . && echo "Formatting OK" || {
            echo ""
            echo "One or more files need reformatting. Run locally:"
            echo "  packer fmt ."
            exit 1
          }

      # ── Syntax / variable validation ─────────────────────────────────────────
      # packer validate checks HCL syntax and that all required variables are
      # supplied. We pass placeholder values for variables that have no default
      # (the actual values are never used — no vSphere connection is made).
      - name: Validate all builds
        run: |
          packer validate \
            -var="vsphere_server=ci-validate" \
            -var="vsphere_user=ci-validate" \
            -var="vsphere_password=ci-validate" \
            -var="vsphere_datacenter=ci-validate" \
            -var="vsphere_datastore=ci-validate" \
            -var="vsphere_network=ci-validate" \
            -var="vsphere_iso_datastore=ci-validate" \
            -var="build_password=ci-validate" \
            -var="build_password_encrypted=ci-validate" \
            .
