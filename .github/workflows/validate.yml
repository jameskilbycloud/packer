name: Validate

# ── Triggers ──────────────────────────────────────────────────────────────────
# Runs on every PR that touches Packer files, and on direct pushes to main.
# Runs on the same self-hosted runner as the rest of the pipeline (no real
# secrets needed — `packer validate` checks syntax and variable references only
# and never contacts vSphere). Keeping every workflow on the same runner
# matches the "everything driven from GitHub against a runner you control"
# operating model.
on:
  pull_request:
    branches:
      - main
    paths:
      - "*.pkr.hcl"
      - "templates/**"
      - "scripts/setup.sh"
      - "scripts/vmtools.sh"
      - ".github/workflows/validate.yml"

  push:
    branches:
      - main
    paths:
      - "*.pkr.hcl"
      - "templates/**"

  # Allow manual runs (useful for debugging workflow changes)
  workflow_dispatch:

# ── Concurrency ───────────────────────────────────────────────────────────────
# Cancel any in-progress validate run for the same PR/branch so stale checks
# don't block merges.
concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:
  validate:
    name: Packer fmt & validate
    runs-on: ${{ vars.RUNNER_LABEL || 'self-hosted' }}
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # ── Install Packer (idempotent) ──────────────────────────────────────────
      # On a runner pre-provisioned per docs/operations.md the binary is
      # already on PATH and this step is a no-op. The fallback install needs
      # sudo, so prefer the pre-install path documented for the runner.
      - name: Install Packer
        run: |
          if command -v packer &>/dev/null; then
            echo "Packer already installed: $(packer version)"
            exit 0
          fi
          # Install via direct binary download — avoids APT codename mismatches
          # (e.g. pre-release Ubuntu codenames not yet in HashiCorp's repo)
          PACKER_VERSION=$(curl -fsSL https://api.releases.hashicorp.com/v1/releases/packer/latest \
            | grep -o '"version":"[^"]*"' | head -1 | cut -d'"' -f4)
          ARCH=$(dpkg --print-architecture)
          curl -fsSL "https://releases.hashicorp.com/packer/${PACKER_VERSION}/packer_${PACKER_VERSION}_linux_${ARCH}.zip" \
            -o /tmp/packer.zip
          python3 -c "import zipfile,sys; zipfile.ZipFile('/tmp/packer.zip').extract('packer','/tmp')"
          sudo mv /tmp/packer /usr/local/bin/packer
          sudo chmod +x /usr/local/bin/packer
          rm /tmp/packer.zip
          packer version

      # ── Cache the vsphere plugin ─────────────────────────────────────────────
      # Plugins live under ~/.config/packer/plugins/ on Linux. Keying on the
      # hash of packer.pkr.hcl invalidates the cache when required_plugins is
      # bumped. On a cache hit `packer init` is a near no-op (~1 s) instead of
      # downloading the plugin tarball from GitHub on every run (~6 s).
      - name: Cache Packer plugin
        uses: actions/cache@v4
        with:
          path: ~/.config/packer/plugins
          key: packer-plugins-${{ runner.os }}-${{ hashFiles('packer.pkr.hcl') }}
          restore-keys: |
            packer-plugins-${{ runner.os }}-

      # ── Download vsphere plugin ──────────────────────────────────────────────
      - name: Packer init
        run: packer init .

      # ── Formatting check ─────────────────────────────────────────────────────
      # Fails if any .pkr.hcl file needs reformatting.
      # To auto-fix locally: packer fmt .
      - name: Check formatting
        run: |
          packer fmt -check -diff . && echo "Formatting OK" || {
            echo ""
            echo "One or more files need reformatting. Run locally:"
            echo "  packer fmt ."
            exit 1
          }

      # ── Syntax / variable validation ─────────────────────────────────────────
      # packer validate checks HCL syntax and that all required variables are
      # supplied. We pass placeholder values for variables that have no default
      # (the actual values are never used — no vSphere connection is made).
      - name: Validate all builds
        run: |
          packer validate \
            -var="vsphere_server=ci-validate" \
            -var="vsphere_user=ci-validate" \
            -var="vsphere_password=ci-validate" \
            -var="vsphere_datacenter=ci-validate" \
            -var="vsphere_cluster=ci-validate" \
            -var="vsphere_datastore=ci-validate" \
            -var="vsphere_network=ci-validate" \
            -var="vsphere_iso_datastore=ci-validate" \
            -var="build_password=ci-validate" \
            -var="build_password_encrypted=ci-validate" \
            .

      # ── Cloud-init schema validation of the autoinstall user-data ───────────
      # `packer validate` catches HCL-side errors, but the body of each
      # autoinstall user-data file is cloud-config YAML that Packer treats as
      # opaque text. Without this step, the only validator for the user-data
      # is the actual install: a malformed `network:` or an un-nested netplan
      # key wouldn't surface until subiquity choked on it 5-15 minutes into a
      # real Packer build. This step renders each template with placeholder
      # values and runs `cloud-init schema` against the result — ~1 second.
      - name: Validate user-data against cloud-init schema
        run: bash scripts/lint-user-data.sh
