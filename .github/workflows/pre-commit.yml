name: Pre-commit

# ── Triggers ──────────────────────────────────────────────────────────────────
# Runs the same hook set defined in .pre-commit-config.yaml on every PR and
# on direct pushes to main. Mirrors the contributor's local pre-commit run
# so PRs are checked even if the contributor didn't `pre-commit install`
# locally.
on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

  # Manual runs are useful for debugging hook configuration changes.
  workflow_dispatch:

# ── Token scope ───────────────────────────────────────────────────────────────
# Read-only — pre-commit hooks read the diff and either pass or fail. No
# writes to the repo, no writes to PRs (the check status is reported via
# workflow scope, not GITHUB_TOKEN).
permissions:
  contents: read

# ── Concurrency ───────────────────────────────────────────────────────────────
# Cancel any in-progress run for the same PR/branch so stale checks don't
# block merges.
concurrency:
  group: pre-commit-${{ github.ref }}
  cancel-in-progress: true

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:
  pre-commit:
    name: Run pre-commit hooks
    runs-on: ${{ vars.RUNNER_LABEL || 'self-hosted' }}
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Need full history for gitleaks to scan the diff against the
          # base branch on PRs. shallow clones (the default) make the
          # diff range unresolvable.
          fetch-depth: 0

      # ── Install Packer (idempotent, best-effort) ─────────────────────────────
      # The packer-fmt hook is a local hook that shells out to `packer`, so it
      # needs to be on PATH. On a runner pre-provisioned per
      # docs/operations.md the binary is already there and this step is a
      # no-op. The fallback install needs sudo; continue-on-error means a
      # failed auto-install does not block the job — the downstream
      # `pre-commit run` step will surface the missing tool clearly.
      - name: Install Packer
        continue-on-error: true
        run: |
          if command -v packer &>/dev/null; then
            echo "Packer already installed: $(packer version)"
            exit 0
          fi
          echo "Packer not installed — attempting best-effort auto-install (requires sudo)."
          echo "If this fails, pre-install per docs/operations.md → Setting up the runner."
          PACKER_VERSION=$(curl -fsSL https://api.releases.hashicorp.com/v1/releases/packer/latest \
            | grep -o '"version":"[^"]*"' | head -1 | cut -d'"' -f4)
          ARCH=$(dpkg --print-architecture)
          curl -fsSL "https://releases.hashicorp.com/packer/${PACKER_VERSION}/packer_${PACKER_VERSION}_linux_${ARCH}.zip" \
            -o /tmp/packer.zip
          python3 -c "import zipfile,sys; zipfile.ZipFile('/tmp/packer.zip').extract('packer','/tmp')"
          sudo mv /tmp/packer /usr/local/bin/packer
          sudo chmod +x /usr/local/bin/packer
          rm /tmp/packer.zip
          packer version

      # ── Install pre-commit (idempotent, best-effort) ─────────────────────────
      # Prefer the runner's system pre-commit (apt-installed per
      # docs/operations.md). Fall back to a per-user pip install so the
      # workflow still passes on a stock runner. continue-on-error covers the
      # case where even the per-user pip install fails (no network, missing
      # python3, etc.) — the downstream `pre-commit run` will fail clearly.
      #
      # We deliberately do NOT use actions/setup-python here: as of Ubuntu
      # 26.04 the upstream actions/python-versions catalogue does not yet
      # publish a 26.04 build, and setup-python errors out with
      # "version 3.x ... was not found for Ubuntu 26.04". The runner's
      # system python3 is what we actually want anyway.
      - name: Install pre-commit
        continue-on-error: true
        run: |
          if command -v pre-commit &>/dev/null; then
            echo "pre-commit already installed: $(pre-commit --version)"
            exit 0
          fi
          echo "pre-commit not pre-installed — attempting best-effort per-user pip install."
          echo "If this fails, pre-install per docs/operations.md → Setting up the runner."
          # --break-system-packages is required on PEP 668 distros (Ubuntu
          # 23.04+). It only affects the runner user's site-packages, not
          # the system Python.
          python3 -m pip install --user --break-system-packages pre-commit
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          "${HOME}/.local/bin/pre-commit" --version

      # ── Run pre-commit ───────────────────────────────────────────────────────
      # Runs the hooks defined in .pre-commit-config.yaml against the full
      # tree. Mirrors what a contributor gets from `pre-commit run --all-files`
      # locally, but enforced server-side so it can't be skipped.
      - name: Run pre-commit
        run: pre-commit run --show-diff-on-failure --color=always --all-files
