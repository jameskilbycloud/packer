name: Check ISO updates

# ── Triggers ──────────────────────────────────────────────────────────────────
# Runs every Monday at 06:00 UTC to catch new Ubuntu point releases. The
# detection is a single curl per version against releases.ubuntu.com/<v>/SHA256SUMS
# so it's cheap and safe to run on a GitHub-hosted runner.
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

# ── Permissions ───────────────────────────────────────────────────────────────
# contents:        push a branch with the bump
# pull-requests:   open the bump PR
# actions:         trigger upload-isos.yml against the new branch
permissions:
  contents: write
  pull-requests: write
  actions: write

# ── Concurrency ───────────────────────────────────────────────────────────────
# Queue rather than cancel — a previous run that's still opening a PR shouldn't
# be interrupted by the next scheduled tick.
concurrency:
  group: check-iso-updates
  cancel-in-progress: false

jobs:
  check:
    name: Detect new ISO point releases
    runs-on: ${{ vars.RUNNER_LABEL || 'self-hosted' }}
    timeout-minutes: 15
    outputs:
      drift:           ${{ steps.detect.outputs.drift }}
      bumped_versions: ${{ steps.detect.outputs.bumped_versions }}
      summary:         ${{ steps.detect.outputs.summary }}
      branch:          ${{ steps.commit.outputs.branch }}
      existing_pr:     ${{ steps.existing.outputs.pr }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      # ── Install gh CLI (idempotent, best-effort) ────────────────────────────
      # Used below for `gh pr list` / `gh pr create`. Fallback needs sudo — if
      # it fails, the downstream gh-invoking step will surface a clear
      # "gh: command not found". Pre-install per docs/operations.md to avoid
      # relying on this fallback.
      - name: Install gh
        continue-on-error: true
        run: |
          if command -v gh &>/dev/null; then
            echo "gh already installed: $(gh --version | head -1)"
            exit 0
          fi
          echo "gh not installed — attempting best-effort auto-install (requires sudo)."
          echo "If this fails, pre-install per docs/operations.md → Setting up the runner."
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
            | sudo tee /etc/apt/sources.list.d/github-cli.list >/dev/null
          sudo apt-get update -qq 2>/dev/null || true
          sudo apt-get install -y gh
          gh --version | head -1

      # ── Detect drift (read-only) ────────────────────────────────────────────
      - name: Detect drift
        id: detect
        run: bash scripts/check-iso-updates.sh

      # ── Bail out early if there's nothing to do ─────────────────────────────
      - name: Up to date — nothing to do
        if: steps.detect.outputs.drift != 'true'
        run: echo "All ISOs are at the latest published point release. Exiting."

      # ── Don't stack PRs if last week's is still open ────────────────────────
      - name: Look for an existing open bump PR
        id: existing
        if: steps.detect.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list \
            --state open \
            --search 'in:title "chore(iso): bump Ubuntu ISO references"' \
            --json number \
            --jq '.[0].number // ""')
          echo "pr=${existing}" >> "$GITHUB_OUTPUT"
          if [[ -n "${existing}" ]]; then
            echo "An open ISO-bump PR already exists: #${existing} — skipping."
          fi

      # ── Apply the rewrites ──────────────────────────────────────────────────
      - name: Apply bumps
        if: steps.detect.outputs.drift == 'true' && steps.existing.outputs.pr == ''
        run: bash scripts/check-iso-updates.sh --apply

      - name: Configure git
        if: steps.detect.outputs.drift == 'true' && steps.existing.outputs.pr == ''
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # ── Branch + commit + push ──────────────────────────────────────────────
      - name: Create branch and commit
        id: commit
        if: steps.detect.outputs.drift == 'true' && steps.existing.outputs.pr == ''
        run: |
          base="iso-bump-$(date -u +%Y%m%d)"
          branch="$base"
          # Defensive — if a branch with today's date already exists upstream
          # (e.g. workflow_dispatch run earlier the same day), append a counter.
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            n=1
            while git ls-remote --exit-code --heads origin "${base}-${n}" >/dev/null 2>&1; do
              n=$((n+1))
            done
            branch="${base}-${n}"
          fi
          git checkout -b "$branch"
          git add -A
          git commit \
            -m "chore(iso): bump Ubuntu ISO references to latest point releases" \
            -m "Auto-generated by check-iso-updates workflow. Diff rewrites every reference to the old live-server-amd64.iso filename(s) across the repo via scripts/check-iso-updates.sh --apply." \
            -m "Co-Authored-By: github-actions[bot] <noreply@github.com>"
          git push -u origin "$branch"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      # ── Open PR ─────────────────────────────────────────────────────────────
      - name: Open pull request
        id: pr
        if: steps.detect.outputs.drift == 'true' && steps.existing.outputs.pr == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUMMARY:  ${{ steps.detect.outputs.summary }}
          BRANCH:   ${{ steps.commit.outputs.branch }}
        run: |
          # Build body via discrete writes — avoids heredoc-indent issues inside
          # YAML block scalars.
          {
            echo "## Summary"
            echo "Auto-detected new Ubuntu live-server ISO point release(s):"
            echo
            echo "${SUMMARY}"
            echo
            echo "The diff is the output of \`scripts/check-iso-updates.sh --apply\`,"
            echo "which rewrites every reference to the old filename across the repo"
            echo "(Packer variables, upload script, build workflow ISO map, README)."
            echo
            echo "## Follow-ups"
            echo "- The companion \`upload-isos.yml\` workflow has been triggered against"
            echo "  this branch to push the new ISO(s) into the Content Library before"
            echo "  merge. Check the linked run below for status."
            echo "- Once upload completes and this PR merges, the next"
            echo "  \`build-templates.yml\` run will pick up the new ISO automatically."
            echo
            echo "## Test plan"
            echo "- [ ] \`validate\` and \`pre-commit\` checks pass on this PR"
            echo "- [ ] Linked \`upload-isos\` run completed successfully"
            echo "- [ ] Diff only touches ISO filename strings (no incidental edits)"
          } > /tmp/pr-body.md
          pr_url=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(iso): bump Ubuntu ISO references to latest point releases" \
            --body-file /tmp/pr-body.md)
          echo "url=${pr_url}" >> "$GITHUB_OUTPUT"
          echo "Opened PR: ${pr_url}"

  # ── Trigger ISO upload against the PR branch ────────────────────────────────
  # upload-isos.yml's filename map lives in scripts/upload-isos.sh, which was
  # just rewritten on the PR branch — so we MUST run upload-isos.yml against
  # `--ref <branch>` (not main) for it to download the new ISO(s).
  trigger-upload:
    name: Trigger upload-isos against PR branch
    needs: check
    if: needs.check.outputs.drift == 'true' && needs.check.outputs.existing_pr == ''
    runs-on: ${{ vars.RUNNER_LABEL || 'self-hosted' }}
    timeout-minutes: 5
    steps:
      # ── Install gh CLI (idempotent, best-effort) ────────────────────────────
      # See comment on the same step in the `check` job above.
      - name: Install gh
        continue-on-error: true
        run: |
          if command -v gh &>/dev/null; then
            echo "gh already installed: $(gh --version | head -1)"
            exit 0
          fi
          echo "gh not installed — attempting best-effort auto-install (requires sudo)."
          echo "If this fails, pre-install per docs/operations.md → Setting up the runner."
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
            | sudo tee /etc/apt/sources.list.d/github-cli.list >/dev/null
          sudo apt-get update -qq 2>/dev/null || true
          sudo apt-get install -y gh
          gh --version | head -1

      - name: Dispatch upload-isos workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUMPED:   ${{ needs.check.outputs.bumped_versions }}
          BRANCH:   ${{ needs.check.outputs.branch }}
        run: |
          echo "Triggering upload-isos.yml on branch '${BRANCH}' for versions: ${BUMPED}"
          gh workflow run upload-isos.yml \
            --ref "${BRANCH}" \
            -f ubuntu_versions="${BUMPED}"
