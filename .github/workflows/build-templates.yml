name: Build Packer Templates

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  # Manual build — choose exactly what to build and optionally override sizing
  workflow_dispatch:
    inputs:
      build_target:
        description: "Template(s) to build"
        required: true
        default: "2404-server"
        type: choice
        options:
          - 2204-server
          - 2204-desktop
          - 2404-server
          - 2404-desktop
          - 2604-server
          - 2604-desktop
          - all-linux
          - all-servers
          - all-desktops
          - all

      dry_run:
        description: "Validate only — do not build"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  # Auto-rebuild templates every Sunday at 02:00 UTC (catches security updates)
  # Comment out or adjust the cron if you do not want automatic rebuilds.
  schedule:
    - cron: "0 2 * * 0"

  # Note: push validation is handled by validate.yml (syntax check only, no
  # vSphere connection). The push trigger has been removed from this workflow
  # to prevent unintended full builds on every code change — use
  # workflow_dispatch to trigger a deliberate build.

# ── Concurrency ───────────────────────────────────────────────────────────────
# Workflow-level serialisation — only one Packer build run at a time. Inside a
# single run, parallelism happens at the Packer level (one `build {}` block
# with multiple sources + `-parallel-builds=N`), not via the matrix. Using a
# workflow-level concurrency group means a second `workflow_dispatch` queues
# instead of stomping on an in-flight build.

# ── Token scope ───────────────────────────────────────────────────────────────
# Workflow-wide default: read-only access to the repository. Every step
# checks out the repo via actions/checkout (read), uploads workflow-scoped
# artifacts (uses workflow scope, not GITHUB_TOKEN), and talks to vSphere
# via the GOVC_*/VSPHERE_* secrets (no GitHub API surface). No step needs
# write access on the GitHub side. Override per-job if that ever changes.
permissions:
  contents: read

concurrency:
  group: packer-build
  cancel-in-progress: false   # queue rather than cancel — don't orphan VMs

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:

  # ── Resolve which builds to run based on the trigger / input ────────────────
  resolve-targets:
    name: Resolve build targets
    runs-on: ${{ vars.RUNNER_LABEL || 'self-hosted' }}
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      smoke_matrix: ${{ steps.set-matrix.outputs.smoke_matrix }}
      dry_run: ${{ steps.set-dry-run.outputs.dry_run }}

    steps:
      - name: Set dry-run flag
        id: set-dry-run
        run: |
          # workflow_dispatch sets the input; push/schedule always build for real
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "dry_run=${{ github.event.inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set build matrix
        id: set-matrix
        run: |
          TARGET="${{ github.event.inputs.build_target }}"

          # Default for schedule / push triggers
          if [[ -z "${TARGET}" ]]; then
            TARGET="all"
          fi

          # Each matrix entry has:
          #   version  — Ubuntu major version (used for VM-name globs, manifest
          #              filename, log filename, friendly Slack name).
          #   only     — Packer `-only` glob. For combined builds, use the
          #              build name `ubuntu-XXXX.*` so both sources run; for
          #              single-target builds, name the source explicitly.
          #   parallel — value for `-parallel-builds`. 2 for combined (server
          #              + desktop together), 1 for single-target (no need to
          #              spawn a second worker).
          #   label    — short human label for log/manifest artifact names.
          # Each matrix entry carries:
          #   version  — Ubuntu major version: "2204"/"2404"/"2604"
          #   label    — short human label used in artifact names
          #   only     — Packer -only glob
          #   parallel — value for -parallel-builds
          #   manifest — manifest filename stem (matches `name` in build {} block)
          #   vm_glob  — VM-name pattern used when destroying orphans on failure
          case "${TARGET}" in
            2204-server)  BUILDS='[{"version":"2204","label":"2204-server", "only":"ubuntu-2204.vsphere-iso.ubuntu-2204-server", "parallel":1,"manifest":"ubuntu-2204","vm_glob":"ubuntu-2204-server-*"}]' ;;
            2204-desktop) BUILDS='[{"version":"2204","label":"2204-desktop","only":"ubuntu-2204.vsphere-iso.ubuntu-2204-desktop","parallel":1,"manifest":"ubuntu-2204","vm_glob":"ubuntu-2204-desktop-*"}]' ;;
            2404-server)  BUILDS='[{"version":"2404","label":"2404-server", "only":"ubuntu-2404.vsphere-iso.ubuntu-2404-server", "parallel":1,"manifest":"ubuntu-2404","vm_glob":"ubuntu-2404-server-*"}]' ;;
            2404-desktop) BUILDS='[{"version":"2404","label":"2404-desktop","only":"ubuntu-2404.vsphere-iso.ubuntu-2404-desktop","parallel":1,"manifest":"ubuntu-2404","vm_glob":"ubuntu-2404-desktop-*"}]' ;;
            2604-server)  BUILDS='[{"version":"2604","label":"2604-server", "only":"ubuntu-2604.vsphere-iso.ubuntu-2604-server", "parallel":1,"manifest":"ubuntu-2604","vm_glob":"ubuntu-2604-server-*"}]' ;;
            2604-desktop) BUILDS='[{"version":"2604","label":"2604-desktop","only":"ubuntu-2604.vsphere-iso.ubuntu-2604-desktop","parallel":1,"manifest":"ubuntu-2604","vm_glob":"ubuntu-2604-desktop-*"}]' ;;
            all-linux)    BUILDS='[
                            {"version":"2204","label":"2204","only":"ubuntu-2204.*","parallel":2,"manifest":"ubuntu-2204","vm_glob":"ubuntu-2204-*"},
                            {"version":"2404","label":"2404","only":"ubuntu-2404.*","parallel":2,"manifest":"ubuntu-2404","vm_glob":"ubuntu-2404-*"},
                            {"version":"2604","label":"2604","only":"ubuntu-2604.*","parallel":2,"manifest":"ubuntu-2604","vm_glob":"ubuntu-2604-*"}
                          ]' ;;
            all-servers)  BUILDS='[
                            {"version":"2204","label":"2204-server","only":"ubuntu-2204.vsphere-iso.ubuntu-2204-server","parallel":1,"manifest":"ubuntu-2204","vm_glob":"ubuntu-2204-server-*"},
                            {"version":"2404","label":"2404-server","only":"ubuntu-2404.vsphere-iso.ubuntu-2404-server","parallel":1,"manifest":"ubuntu-2404","vm_glob":"ubuntu-2404-server-*"},
                            {"version":"2604","label":"2604-server","only":"ubuntu-2604.vsphere-iso.ubuntu-2604-server","parallel":1,"manifest":"ubuntu-2604","vm_glob":"ubuntu-2604-server-*"}
                          ]' ;;
            all-desktops) BUILDS='[
                            {"version":"2204","label":"2204-desktop","only":"ubuntu-2204.vsphere-iso.ubuntu-2204-desktop","parallel":1,"manifest":"ubuntu-2204","vm_glob":"ubuntu-2204-desktop-*"},
                            {"version":"2404","label":"2404-desktop","only":"ubuntu-2404.vsphere-iso.ubuntu-2404-desktop","parallel":1,"manifest":"ubuntu-2404","vm_glob":"ubuntu-2404-desktop-*"},
                            {"version":"2604","label":"2604-desktop","only":"ubuntu-2604.vsphere-iso.ubuntu-2604-desktop","parallel":1,"manifest":"ubuntu-2604","vm_glob":"ubuntu-2604-desktop-*"}
                          ]' ;;
            all)          BUILDS='[
                            {"version":"2204","label":"2204","only":"ubuntu-2204.*","parallel":2,"manifest":"ubuntu-2204","vm_glob":"ubuntu-2204-*"},
                            {"version":"2404","label":"2404","only":"ubuntu-2404.*","parallel":2,"manifest":"ubuntu-2404","vm_glob":"ubuntu-2404-*"},
                            {"version":"2604","label":"2604","only":"ubuntu-2604.*","parallel":2,"manifest":"ubuntu-2604","vm_glob":"ubuntu-2604-*"}
                          ]' ;;
            *)            BUILDS='[{"version":"2404","label":"2404-server","only":"ubuntu-2404.vsphere-iso.ubuntu-2404-server","parallel":1,"manifest":"ubuntu-2404","vm_glob":"ubuntu-2404-server-*"}]' ;;
          esac

          # Collapse multi-line JSON onto one line so GitHub-Actions parses it.
          BUILDS_ONELINE=$(echo "${BUILDS}" | tr -d '\n' | tr -s ' ')
          echo "matrix={\"include\":${BUILDS_ONELINE}}" >> "$GITHUB_OUTPUT"
          echo "Resolved targets: ${BUILDS_ONELINE}"

          # ── Smoke-test matrix ─────────────────────────────────────────────
          # Always one entry per (version, role). Combined builds (e.g. "all"
          # with a single matrix entry that builds server + desktop together)
          # fan out here so each produced template gets its own smoke run.
          # Fields:
          #   label      — short human label (matches build label for single
          #                target, expands to <ver>-<role> for combined)
          #   role       — "server" | "desktop"
          #   glob       — govc -name pattern to locate the just-built template
          #   goss_spec  — relative path to the goss spec file
          case "${TARGET}" in
            2204-server)  SMOKE='[{"label":"2204-server", "role":"server", "glob":"ubuntu-2204-server-*", "goss_spec":"goss/server-clone.yaml"}]' ;;
            2204-desktop) SMOKE='[{"label":"2204-desktop","role":"desktop","glob":"ubuntu-2204-desktop-*","goss_spec":"goss/desktop-clone.yaml"}]' ;;
            2404-server)  SMOKE='[{"label":"2404-server", "role":"server", "glob":"ubuntu-2404-server-*", "goss_spec":"goss/server-clone.yaml"}]' ;;
            2404-desktop) SMOKE='[{"label":"2404-desktop","role":"desktop","glob":"ubuntu-2404-desktop-*","goss_spec":"goss/desktop-clone.yaml"}]' ;;
            2604-server)  SMOKE='[{"label":"2604-server", "role":"server", "glob":"ubuntu-2604-server-*", "goss_spec":"goss/server-clone.yaml"}]' ;;
            2604-desktop) SMOKE='[{"label":"2604-desktop","role":"desktop","glob":"ubuntu-2604-desktop-*","goss_spec":"goss/desktop-clone.yaml"}]' ;;
            all-linux|all)
                          SMOKE='[
                            {"label":"2204-server", "role":"server", "glob":"ubuntu-2204-server-*", "goss_spec":"goss/server-clone.yaml"},
                            {"label":"2204-desktop","role":"desktop","glob":"ubuntu-2204-desktop-*","goss_spec":"goss/desktop-clone.yaml"},
                            {"label":"2404-server", "role":"server", "glob":"ubuntu-2404-server-*", "goss_spec":"goss/server-clone.yaml"},
                            {"label":"2404-desktop","role":"desktop","glob":"ubuntu-2404-desktop-*","goss_spec":"goss/desktop-clone.yaml"},
                            {"label":"2604-server", "role":"server", "glob":"ubuntu-2604-server-*", "goss_spec":"goss/server-clone.yaml"},
                            {"label":"2604-desktop","role":"desktop","glob":"ubuntu-2604-desktop-*","goss_spec":"goss/desktop-clone.yaml"}
                          ]' ;;
            all-servers)  SMOKE='[
                            {"label":"2204-server","role":"server","glob":"ubuntu-2204-server-*","goss_spec":"goss/server-clone.yaml"},
                            {"label":"2404-server","role":"server","glob":"ubuntu-2404-server-*","goss_spec":"goss/server-clone.yaml"},
                            {"label":"2604-server","role":"server","glob":"ubuntu-2604-server-*","goss_spec":"goss/server-clone.yaml"}
                          ]' ;;
            all-desktops) SMOKE='[
                            {"label":"2204-desktop","role":"desktop","glob":"ubuntu-2204-desktop-*","goss_spec":"goss/desktop-clone.yaml"},
                            {"label":"2404-desktop","role":"desktop","glob":"ubuntu-2404-desktop-*","goss_spec":"goss/desktop-clone.yaml"},
                            {"label":"2604-desktop","role":"desktop","glob":"ubuntu-2604-desktop-*","goss_spec":"goss/desktop-clone.yaml"}
                          ]' ;;
            *)            SMOKE='[{"label":"2404-server","role":"server","glob":"ubuntu-2404-server-*","goss_spec":"goss/server-clone.yaml"}]' ;;
          esac
          SMOKE_ONELINE=$(echo "${SMOKE}" | tr -d '\n' | tr -s ' ')
          echo "smoke_matrix={\"include\":${SMOKE_ONELINE}}" >> "$GITHUB_OUTPUT"
          echo "Smoke targets: ${SMOKE_ONELINE}"

  # ── vSphere pre-flight ──────────────────────────────────────────────────────
  # Fast (sub-minute) health check that runs BEFORE the build matrix fans out.
  # Catches a sick vCenter, missing datastore, full datastore, or empty
  # content library at sign-in time instead of letting each matrix leg burn
  # the full 30m ssh_timeout discovering the same fault independently.
  # Skipped on dry-run because dry-run does not touch vSphere.
  preflight:
    name: vSphere pre-flight
    needs: resolve-targets
    if: needs.resolve-targets.outputs.dry_run == 'false'
    runs-on: ${{ vars.RUNNER_LABEL || 'self-hosted' }}
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Best-effort auto-install. Fallback needs sudo — if it fails, the next
      # step that calls `govc` surfaces a clear "command not found". Pre-install
      # per docs/operations.md to avoid relying on this fallback.
      - name: Install govc
        continue-on-error: true
        run: |
          if command -v govc &>/dev/null; then
            echo "govc already installed: $(govc version)"
            exit 0
          fi
          echo "govc not installed — attempting best-effort auto-install (requires sudo)."
          echo "If this fails, pre-install per docs/operations.md → Setting up the runner."
          GOVC_VERSION=$(curl -fsSL https://api.github.com/repos/vmware/govmomi/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4)
          curl -fsSL \
            "https://github.com/vmware/govmomi/releases/download/${GOVC_VERSION}/govc_Linux_x86_64.tar.gz" \
            | sudo tar -xzf - -C /usr/local/bin govc
          sudo chmod +x /usr/local/bin/govc
          echo "govc installed: $(govc version)"

      - name: vSphere health checks
        env:
          GOVC_URL:               ${{ secrets.VSPHERE_SERVER }}
          GOVC_USERNAME:          ${{ secrets.VSPHERE_USER }}
          GOVC_PASSWORD:          ${{ secrets.VSPHERE_PASSWORD }}
          GOVC_INSECURE:          ${{ secrets.VSPHERE_INSECURE || 'false' }}
          GOVC_DATACENTER:        ${{ secrets.VSPHERE_DATACENTER }}
          VSPHERE_DATASTORE:      ${{ secrets.VSPHERE_DATASTORE }}
          VSPHERE_CLUSTER:        ${{ secrets.VSPHERE_CLUSTER }}
          VSPHERE_HOST:           ${{ secrets.VSPHERE_HOST }}
          CONTENT_LIBRARY:        ${{ vars.CONTENT_LIBRARY || 'Packer-ISOs' }}
          PREFLIGHT_MIN_FREE_GB:  ${{ vars.PREFLIGHT_MIN_FREE_GB || '60' }}
        run: bash scripts/vsphere-preflight.sh

  # ── Packer build (one job per matrix entry) ─────────────────────────────────
  # For "all" builds, each matrix entry covers a whole Ubuntu version (server +
  # desktop) and Packer runs both sources in parallel inside that one job. For
  # single-target inputs (e.g. "2404-server") the matrix entry has parallel=1
  # and `only` names just one source.
  build:
    name: Build ubuntu-${{ matrix.label }}
    needs: [resolve-targets, preflight]
    # preflight is skipped on dry-run (it requires a live vCenter); allow
    # build to proceed either when preflight succeeded OR when it was skipped.
    # A failed preflight short-circuits the whole matrix.
    if: |
      always() &&
      needs.resolve-targets.result == 'success' &&
      (needs.preflight.result == 'success' || needs.preflight.result == 'skipped')
    runs-on: ${{ vars.RUNNER_LABEL || 'self-hosted' }}
    timeout-minutes: 180              # per-leg kill-switch; clean leg ~25 min, worst-case (MAX_ATTEMPTS=2 × 30m ssh_timeout + 60s backoff + provisioner/smoke time) ~75 min — buffer covers cold-start + the rare 2-attempt retry

    strategy:
      matrix: ${{ fromJson(needs.resolve-targets.outputs.matrix) }}
      fail-fast: false   # let other matrix entries continue if one fails
      max-parallel: 1    # one Packer process per runner — vSphere parallelism is inside the process

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # ── Verify required secrets are present ─────────────────────────────────
      # Fail fast with a clear message rather than letting Packer error on
      # cryptic vcenter_server / username / password / host / ssh_username errors.
      - name: Check required secrets
        env:
          VSPHERE_SERVER:    ${{ secrets.VSPHERE_SERVER }}
          VSPHERE_USER:      ${{ secrets.VSPHERE_USER }}
          VSPHERE_PASSWORD:  ${{ secrets.VSPHERE_PASSWORD }}
          VSPHERE_DATACENTER: ${{ secrets.VSPHERE_DATACENTER }}
          VSPHERE_DATASTORE: ${{ secrets.VSPHERE_DATASTORE }}
          VSPHERE_NETWORK:   ${{ secrets.VSPHERE_NETWORK }}
          VSPHERE_CLUSTER:   ${{ secrets.VSPHERE_CLUSTER }}
          VSPHERE_HOST:      ${{ secrets.VSPHERE_HOST }}
          VSPHERE_ISO_LIBRARY_DATASTORE: ${{ secrets.VSPHERE_ISO_LIBRARY_DATASTORE }}
          BUILD_USERNAME:    ${{ secrets.BUILD_USERNAME }}
          BUILD_PASSWORD:    ${{ secrets.BUILD_PASSWORD }}
          BUILD_PASSWORD_ENCRYPTED: ${{ secrets.BUILD_PASSWORD_ENCRYPTED }}
        run: |
          missing=()

          # Core connection — all required
          [[ -z "${VSPHERE_SERVER}"    ]] && missing+=("VSPHERE_SERVER")
          [[ -z "${VSPHERE_USER}"      ]] && missing+=("VSPHERE_USER")
          [[ -z "${VSPHERE_PASSWORD}"  ]] && missing+=("VSPHERE_PASSWORD")
          [[ -z "${VSPHERE_DATACENTER}" ]] && missing+=("VSPHERE_DATACENTER")
          [[ -z "${VSPHERE_DATASTORE}" ]] && missing+=("VSPHERE_DATASTORE")
          [[ -z "${VSPHERE_NETWORK}"   ]] && missing+=("VSPHERE_NETWORK")
          # Datastore that backs the Content Library (ISOs are resolved from it at runtime)
          [[ -z "${VSPHERE_ISO_LIBRARY_DATASTORE}" ]] && missing+=("VSPHERE_ISO_LIBRARY_DATASTORE")

          # At least one of VSPHERE_HOST or VSPHERE_CLUSTER must be set
          if [[ -z "${VSPHERE_HOST}" && -z "${VSPHERE_CLUSTER}" ]]; then
            missing+=("VSPHERE_HOST (or VSPHERE_CLUSTER — at least one required)")
          fi

          # Linux build credentials always required because variables.pkr.hcl
          # declares them with no default.
          [[ -z "${BUILD_USERNAME}"   ]] && missing+=("BUILD_USERNAME")
          [[ -z "${BUILD_PASSWORD}"   ]] && missing+=("BUILD_PASSWORD")
          [[ -z "${BUILD_PASSWORD_ENCRYPTED}" ]] && missing+=("BUILD_PASSWORD_ENCRYPTED")

          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "❌ The following required secrets are not set:"
            for s in "${missing[@]}"; do
              echo "   • ${s}"
            done
            echo ""
            echo "Set them via: Settings → Secrets and variables → Actions"
            exit 1
          fi

          echo "✅ All required secrets are present."

      # ── Install Packer (idempotent, best-effort) ─────────────────────────────
      # Each Install* step below is continue-on-error: the auto-install needs
      # sudo and may fail (no sudo, network, broken APT). If it does, the
      # downstream step that calls the tool surfaces a clear "command not
      # found". Pre-install per docs/operations.md to avoid relying on the
      # fallback.
      - name: Install Packer
        continue-on-error: true
        run: |
          if command -v packer &>/dev/null; then
            echo "Packer already installed: $(packer version)"
            exit 0
          fi
          echo "Packer not installed — attempting best-effort auto-install (requires sudo)."
          echo "If this fails, pre-install per docs/operations.md → Setting up the runner."
          # Install via direct binary download — avoids APT codename mismatches
          # (e.g. pre-release Ubuntu codenames not yet in HashiCorp's repo)
          PACKER_VERSION=$(curl -fsSL https://api.releases.hashicorp.com/v1/releases/packer/latest \
            | grep -o '"version":"[^"]*"' | head -1 | cut -d'"' -f4)
          ARCH=$(dpkg --print-architecture)
          curl -fsSL "https://releases.hashicorp.com/packer/${PACKER_VERSION}/packer_${PACKER_VERSION}_linux_${ARCH}.zip" \
            -o /tmp/packer.zip
          python3 -c "import zipfile,sys; zipfile.ZipFile('/tmp/packer.zip').extract('packer','/tmp')"
          sudo mv /tmp/packer /usr/local/bin/packer
          sudo chmod +x /usr/local/bin/packer
          rm /tmp/packer.zip
          packer version

      # ── Install xorriso (required for cloud-init CD image creation) ─────────
      - name: Install xorriso
        continue-on-error: true
        run: |
          if command -v xorriso &>/dev/null; then
            echo "xorriso already installed: $(xorriso --version 2>&1 | head -1)"
            exit 0
          fi
          echo "xorriso not installed — attempting best-effort auto-install (requires sudo)."
          echo "If this fails, pre-install per docs/operations.md → Setting up the runner."
          # Ignore update errors — broken third-party repos (e.g. HashiCorp for
          # pre-release Ubuntu codenames) must not block the standard repo install.
          sudo apt-get update -qq 2>/dev/null || true
          sudo apt-get install -y xorriso
          echo "xorriso: $(xorriso --version 2>&1 | head -1)"

      # ── Install govc (required to resolve Content Library ISO paths) ──────────
      - name: Install govc
        continue-on-error: true
        run: |
          if command -v govc &>/dev/null; then
            echo "govc already installed: $(govc version)"
            exit 0
          fi
          echo "govc not installed — attempting best-effort auto-install (requires sudo)."
          echo "If this fails, pre-install per docs/operations.md → Setting up the runner."
          GOVC_VERSION=$(curl -fsSL https://api.github.com/repos/vmware/govmomi/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4)
          curl -fsSL \
            "https://github.com/vmware/govmomi/releases/download/${GOVC_VERSION}/govc_Linux_x86_64.tar.gz" \
            | sudo tar -xzf - -C /usr/local/bin govc
          sudo chmod +x /usr/local/bin/govc
          echo "govc installed: $(govc version)"

      # ── Resolve Content Library ISO paths via govc library.info ─────────────
      # Content Library items live at contentlib-{lib-uuid}/{item-uuid}/{file}
      # on the backing datastore. We get the UUIDs via govc library.info -json
      # (which uses the vSphere SDK, not the REST API) and construct the path.
      - name: Resolve ISO paths from Content Library
        env:
          GOVC_URL:        ${{ secrets.VSPHERE_SERVER }}
          GOVC_USERNAME:   ${{ secrets.VSPHERE_USER }}
          GOVC_PASSWORD:   ${{ secrets.VSPHERE_PASSWORD }}
          GOVC_INSECURE:   ${{ secrets.VSPHERE_INSECURE || 'false' }}
          GOVC_DATACENTER: ${{ secrets.VSPHERE_DATACENTER }}
          LIB_DATASTORE:   ${{ secrets.VSPHERE_ISO_LIBRARY_DATASTORE }}
          CONTENT_LIBRARY: ${{ vars.CONTENT_LIBRARY || 'Packer-ISOs' }}
          MATRIX_VERSION:  ${{ matrix.version }}
        run: |
          declare -A ISO_ITEMS=(
            [2204]="ubuntu-22.04.5-live-server-amd64.iso"
            [2404]="ubuntu-24.04.4-live-server-amd64.iso"
            [2604]="ubuntu-26.04-live-server-amd64.iso"
          )
          declare -A RESOLVED=()

          # ── Confirm library exists and list its contents ───────────────────
          echo "Library '${CONTENT_LIBRARY}' items:"
          govc library.ls "/${CONTENT_LIBRARY}/" 2>/dev/null | sed 's/^/  /' || true

          if [[ -z "$(govc library.ls "/${CONTENT_LIBRARY}" 2>/dev/null)" ]]; then
            echo "❌ Content Library '${CONTENT_LIBRARY}' not found. Available libraries:"
            govc library.ls 2>/dev/null | sed 's/^/   /' || echo "   (none visible)"
            echo "   Run the upload-isos workflow first, or fix the CONTENT_LIBRARY repo variable."
            exit 1
          fi

          # ── Get library UUID from govc library.info -json ─────────────────
          _pick_id='import sys,json;d=(json.load(sys.stdin) or [{}])[0];print(d.get("ID",d.get("id","")))'
          lib_id=$(govc library.info -json "/${CONTENT_LIBRARY}" 2>/dev/null \
            | python3 -c "${_pick_id}" 2>/dev/null || echo "")
          echo "Library UUID: ${lib_id:-NOT FOUND}"

          # ── For each ISO: get item UUID and construct the datastore path ───
          echo "ISO_BACKING_DATASTORE=${LIB_DATASTORE}" >> "$GITHUB_ENV"

          # Iterate every key in ISO_ITEMS. Each result is exported as an env
          # var named RESOLVED_ISO_<KEY>, where <KEY> is uppercased
          # (e.g. 2604 → RESOLVED_ISO_2604).
          for ver in "${!ISO_ITEMS[@]}"; do
            item="${ISO_ITEMS[$ver]}"
            item_stem="${item%.iso}"
            ver_key="${ver^^}"; ver_key="${ver_key//-/_}"

            # Try exact name first, then stem without extension
            item_id=$(govc library.info -json "/${CONTENT_LIBRARY}/${item}" 2>/dev/null \
              | python3 -c "${_pick_id}" 2>/dev/null || echo "")
            if [[ -z "${item_id}" ]]; then
              item_id=$(govc library.info -json "/${CONTENT_LIBRARY}/${item_stem}" 2>/dev/null \
                | python3 -c "${_pick_id}" 2>/dev/null || echo "")
            fi
            # Final fallback: pattern-match the library to absorb point-release
            # suffixes that diverge from the hardcoded filename
            # (e.g. ubuntu-26.04 vs ubuntu-26.04.0 vs ubuntu-26.04.1).
            if [[ -z "${item_id}" ]]; then
              maj="${ver:0:2}"
              min="${ver:2:2}"
              matched=$(govc library.ls "/${CONTENT_LIBRARY}/" 2>/dev/null \
                | sed 's|^.*/||; s|\.iso$||' \
                | grep -E "^ubuntu-${maj}\.${min}(\.[0-9]+)?-live-server-amd64$" \
                | head -1 || true)
              if [[ -n "${matched}" ]]; then
                echo "  ${ver}: glob fallback matched '${matched}'"
                item_id=$(govc library.info -json "/${CONTENT_LIBRARY}/${matched}" 2>/dev/null \
                  | python3 -c "${_pick_id}" 2>/dev/null || echo "")
              fi
            fi

            if [[ -n "${item_id}" && -n "${lib_id}" ]]; then
              item_dir="contentlib-${lib_id}/${item_id}"
              # List actual files in the item directory — vSphere may store
              # with original filename or a UUID-based name; don't assume.
              actual_file=$(govc datastore.ls -ds="${LIB_DATASTORE}" "${item_dir}/" 2>/dev/null \
                | grep -i '\.iso$' | head -1 || true)
              if [[ -n "${actual_file}" ]]; then
                rel="${item_dir}/${actual_file}"
                echo "  ${ver}: ${rel}"
                RESOLVED[$ver]="${rel}"
                echo "RESOLVED_ISO_${ver_key}=${rel}" >> "$GITHUB_ENV"
              else
                echo "  ${ver}: item dir found (${item_dir}) but no .iso file listed"
                echo "  ${ver}: datastore.ls output:"
                govc datastore.ls -ds="${LIB_DATASTORE}" "${item_dir}/" 2>&1 | sed 's/^/    /' || true
                echo "RESOLVED_ISO_${ver_key}=" >> "$GITHUB_ENV"
              fi
            else
              echo "  ${ver}: NOT FOUND (item_id='${item_id}' lib_id='${lib_id}')"
              echo "RESOLVED_ISO_${ver_key}=" >> "$GITHUB_ENV"
            fi
          done

          # Fail fast if the ISO for this matrix entry's version is missing
          if [[ -n "${ISO_ITEMS[$MATRIX_VERSION]:-}" && -z "${RESOLVED[$MATRIX_VERSION]:-}" ]]; then
            echo "❌ ${ISO_ITEMS[$MATRIX_VERSION]} not found — run the upload-isos workflow first"
            exit 1
          fi

      # ── Ensure vSphere VM folder exists ─────────────────────────────────────
      # govc folder.create is idempotent-ish but errors on existing folders.
      # We walk each path component and create it individually, swallowing
      # "already exists" errors with `|| true`. Nested paths (e.g. "a/b/c")
      # are handled by creating each level in turn.
      - name: Ensure vSphere VM folder exists
        env:
          GOVC_URL:        ${{ secrets.VSPHERE_SERVER }}
          GOVC_USERNAME:   ${{ secrets.VSPHERE_USER }}
          GOVC_PASSWORD:   ${{ secrets.VSPHERE_PASSWORD }}
          GOVC_INSECURE:   ${{ secrets.VSPHERE_INSECURE || 'false' }}
          GOVC_DATACENTER: ${{ secrets.VSPHERE_DATACENTER }}
          VSPHERE_FOLDER:  ${{ secrets.VSPHERE_FOLDER || 'packer' }}
        run: |
          current="/${GOVC_DATACENTER}/vm"
          IFS='/' read -ra parts <<< "${VSPHERE_FOLDER}"
          for part in "${parts[@]}"; do
            [[ -z "${part}" ]] && continue
            current="${current}/${part}"
            govc folder.create "${current}" 2>/dev/null || true
          done
          echo "✅ Folder path ensured: /${GOVC_DATACENTER}/vm/${VSPHERE_FOLDER}"

      # ── Install plugin ───────────────────────────────────────────────────────
      - name: Packer init (download vsphere plugin)
        run: packer init .

      # ── Generate ephemeral build SSH keypair ─────────────────────────────────
      # A fresh per-run keypair lets Packer SSH into the build VM via pubkey
      # rather than the build_password — keeps plaintext passwords off the
      # SSH path. The pubkey is injected into autoinstall via
      # build_ssh_authorized_keys; the private key path goes via
      # build_ssh_private_key_file. Both are wiped after the build by the
      # cleanup step at the bottom of the job.
      #
      # build_password is still set: autoinstall needs build_password_encrypted
      # to give the user account a password, and shutdown_command uses
      # `echo password | sudo -S`. But Packer's SSH connection no longer
      # depends on it.
      - name: Generate ephemeral build SSH keypair
        if: needs.resolve-targets.outputs.dry_run == 'false'
        id: build-keypair
        run: |
          keydir="${RUNNER_TEMP}/packer-build-key"
          mkdir -p "${keydir}"
          chmod 700 "${keydir}"
          ssh-keygen -t ed25519 -N '' \
            -f "${keydir}/id_ed25519" \
            -C "packer-build-${GITHUB_RUN_ID}-${{ matrix.label }}" >/dev/null
          chmod 600 "${keydir}/id_ed25519"
          {
            echo "private_key_path=${keydir}/id_ed25519"
            # Pubkey via multi-line output syntax in case the comment ever
            # contains characters that need escaping.
            echo "public_key<<KEYEOF"
            cat "${keydir}/id_ed25519.pub"
            echo "KEYEOF"
          } >> "${GITHUB_OUTPUT}"
          echo "Generated ephemeral keypair at ${keydir}"

      # ── Write variables file from secrets ────────────────────────────────────
      # We write a temporary vars file rather than passing dozens of -var flags.
      # The file is removed in the cleanup step regardless of build success.
      - name: Write variables file
        run: |
          cat > runner.pkrvars.hcl << 'EOF'
          vsphere_server              = "${{ secrets.VSPHERE_SERVER }}"
          vsphere_user                = "${{ secrets.VSPHERE_USER }}"
          vsphere_password            = "${{ secrets.VSPHERE_PASSWORD }}"
          vsphere_insecure_connection = ${{ secrets.VSPHERE_INSECURE || 'false' }}
          vsphere_datacenter          = "${{ secrets.VSPHERE_DATACENTER }}"
          vsphere_cluster             = "${{ secrets.VSPHERE_CLUSTER }}"
          vsphere_host                = "${{ secrets.VSPHERE_HOST }}"
          vsphere_datastore           = "${{ secrets.VSPHERE_DATASTORE }}"
          vsphere_network             = "${{ secrets.VSPHERE_NETWORK }}"
          vsphere_folder              = "${{ secrets.VSPHERE_FOLDER }}"
          vsphere_iso_datastore       = "${{ env.ISO_BACKING_DATASTORE }}"
          vsphere_template_content_library = "${{ vars.TEMPLATE_CONTENT_LIBRARY || vars.CONTENT_LIBRARY || 'Packer-ISOs' }}"
          build_username              = "${{ secrets.BUILD_USERNAME }}"
          build_password              = "${{ secrets.BUILD_PASSWORD }}"
          build_password_encrypted    = "${{ secrets.BUILD_PASSWORD_ENCRYPTED }}"
          ubuntu_2204_iso_path        = "${{ env.RESOLVED_ISO_2204 }}"
          ubuntu_2404_iso_path        = "${{ env.RESOLVED_ISO_2404 }}"
          ubuntu_2604_iso_path        = "${{ env.RESOLVED_ISO_2604 }}"
          admin_username              = "${{ secrets.ADMIN_USERNAME }}"
          admin_github_user           = "${{ secrets.ADMIN_GITHUB_USER }}"
          EOF
          # git_commit must be appended outside the single-quoted heredoc so
          # bash expands ${GITHUB_SHA:0:8}. Inside 'EOF' no expansion occurs
          # and Packer rejects the raw bash slice syntax as invalid HCL.
          echo "git_commit = \"${GITHUB_SHA:0:8}\"" >> runner.pkrvars.hcl
          # Strip leading whitespace added by the heredoc indentation
          sed -i 's/^[[:space:]]*//' runner.pkrvars.hcl

          # Append the ephemeral build SSH keypair vars (only set on real
          # builds; dry-run skips the keypair-generation step). HCL list
          # literal: `["ssh-ed25519 AAAA... comment"]`.
          if [[ -n "${{ steps.build-keypair.outputs.public_key }}" ]]; then
            {
              echo "build_ssh_private_key_file = \"${{ steps.build-keypair.outputs.private_key_path }}\""
              echo "build_ssh_authorized_keys = [\"${{ steps.build-keypair.outputs.public_key }}\"]"
            } >> runner.pkrvars.hcl
          fi

      # ── Validate ─────────────────────────────────────────────────────────────
      - name: Packer validate
        env:
          TMPDIR: /var/tmp
        run: |
          packer validate \
            -var-file=runner.pkrvars.hcl \
            -only="${{ matrix.only }}" \
            .

      # ── Record build start ──────────────────────────────────────────────────
      # Capture the epoch immediately before `packer build` so the metrics
      # step further down can compute an accurate build duration. Skipped on
      # dry-run packer builds because there is no real build to time.
      - name: Record build start
        if: needs.resolve-targets.outputs.dry_run == 'false'
        id: build-start
        run: echo "start_epoch=$(date -u +%s)" >> "$GITHUB_OUTPUT"

      # ── Build ────────────────────────────────────────────────────────────────
      # `-parallel-builds` controls how many sources Packer builds simultaneously
      # within this single Packer process. For combined "all" runs it's 2 (server
      # + desktop together); for single-target runs it's 1.
      #
      # Retry policy: at most one retry on transient failures (vSphere DRS
      # migrations, ISO datastore hiccups, transient network blips). The
      # retry decision is driven by pattern-matching the Packer log: if the
      # failure looks transient we sleep 60s and retry once; if it doesn't
      # match (e.g. provisioner exit non-zero, validation error, missing
      # variable) we exit immediately so real bugs aren't masked behind
      # repeated builds.
      #
      # `-on-error=abort` leaves the failing VM intact for the screenshot
      # step (the "Destroy orphaned VM" step downstream handles cleanup);
      # `-force` lets the retry overwrite any leftover artefacts. See the
      # in-loop comment on lines 678-687 for the full screenshot rationale.
      - name: Packer build
        if: needs.resolve-targets.outputs.dry_run == 'false'
        env:
          PACKER_LOG: 1
          PACKER_LOG_PATH: packer-${{ matrix.label }}.log
          TMPDIR: /var/tmp   # /tmp is a small tmpfs; Packer writes CD images here
          # Retry budget — 2 attempts uniform across all versions.
          #
          # History: 2604 used to need MAX_ATTEMPTS=4 because curtin's
          # default install source on the Resolute ISO (fsimage-layered)
          # tripped a probabilistic OverlayFS oops in ovl_iterate_merged
          # (LP #2150586 et al). 4 attempts gave ~94% leg success against
          # ~50% per-attempt.
          #
          # That probabilistic failure mode is gone as of v1.0.0 — the
          # autoinstall now sets source.id: ubuntu-server-minimal which
          # selects curtin's fsimage handler (no overlay, no oops surface).
          # Attempt 1 succeeds deterministically; attempts 3-4 became dead
          # weight that masked any future regressions under unnecessary
          # padding. Dropping to 2 gives faster regression signal (failures
          # surface in ~70 min instead of ~140 min) and consistency across
          # versions. The 2nd attempt still absorbs real infra transients —
          # vCenter API blips, ISO datastore hiccups, momentary DRS
          # migrations.
          MAX_ATTEMPTS: '2'
        run: |
          set +e
          attempt=1
          while [[ ${attempt} -le ${MAX_ATTEMPTS} ]]; do
            # Note on log scoping: Packer opens PACKER_LOG_PATH with O_TRUNC
            # on every invocation. A previous version of this loop scoped
            # the transient-pattern grep using `tail -c $((after - before))`
            # to look at "just this attempt's bytes" — but that diff went
            # to zero whenever attempt N's log size happened to match
            # attempt N-1's. Both transient grep passes then skipped and
            # the script took the non-transient exit, masking a real
            # retryable failure. Since Packer truncates per-invocation,
            # the file at end-of-attempt always contains ONLY this
            # attempt's output, so `tail -n 200 <file>` already scopes
            # correctly without a before/after byte diff.

            echo ""
            echo "═══════════════════════════════════════════════════════════════"
            echo "  Build attempt ${attempt}/${MAX_ATTEMPTS}"
            echo "═══════════════════════════════════════════════════════════════"

            packer build \
              -var-file=runner.pkrvars.hcl \
              -only="${{ matrix.only }}" \
              -parallel-builds="${{ matrix.parallel }}" \
              -on-error=abort \
              -timestamp-ui \
              -force \
              .
            rc=$?
            # -on-error=abort leaves the failing VM running and intact so the
            # downstream "Capture console screenshot" step can grab a PNG of
            # whatever's on screen at the failure point. (With -on-error=cleanup
            # Packer powers off + destroys the VM the moment it hits the SSH
            # timeout, ~2 seconds before any subsequent workflow step can race
            # in.) The existing "Destroy orphaned VM" step cleans up after the
            # screenshot capture, so we still end with a clean vSphere
            # inventory. Side effect: between retry attempts the previous
            # attempt's VM is also left behind, so we destroy any leftover
            # VM(s) matching this build's name pattern before looping.

            if [[ ${rc} -eq 0 ]]; then
              [[ ${attempt} -gt 1 ]] && echo "==> Build succeeded on retry (attempt ${attempt})"
              exit 0
            fi

            if [[ ${attempt} -ge ${MAX_ATTEMPTS} ]]; then
              echo "==> Build failed after ${MAX_ATTEMPTS} attempts (final exit code: ${rc})"
              exit "${rc}"
            fi

            # Pattern-match the log for transient-looking failures, but
            # scope it to:
            #   1. only the bytes this attempt produced (avoid matching
            #      transients from a previous failed attempt's tail)
            #   2. only the LAST 200 lines of that (avoid matching benign
            #      transients from earlier in the build that already
            #      recovered — apt-get retries, momentary DNS blips, etc.)
            # The intent is "look at the actual failure region, not the
            # whole 25-minute build log".
            # SSH-timeout retry IS allowed now (with the 30m fail-fast cap,
            # one retry is affordable and we know the 26.04 subiquity Network
            # observer loop is probabilistic — a fresh attempt has a ~50%
            # chance of succeeding cleanly). The old anti-pattern guard that
            # blocked retry on "Timeout waiting for SSH" was added when
            # ssh_timeout was 180m, before we understood the bug was random.
            #
            # `tail -n 200 "${PACKER_LOG_PATH}"` (no byte slicing) reads the
            # last 200 lines of the current log content. Because Packer
            # truncates PACKER_LOG_PATH on each invocation (see "Note on log
            # scoping" at the top of the loop), those 200 lines are entirely
            # from THIS attempt — no risk of grepping leftover bytes from
            # a previous attempt's tail. The earlier byte-diff approach
            # silently broke retries when consecutive attempts produced
            # similar-sized logs (attempt_bytes ≈ 0 → gate failed → no retry,
            # even on bona fide transient failures).
            ssh_timeout_match=false
            if tail -n 200 "${PACKER_LOG_PATH}" 2>/dev/null \
              | grep -qE 'Timeout waiting for SSH|Timeout waiting for IP'; then
              ssh_timeout_match=true
            fi

            transient_match=false
            if tail -n 200 "${PACKER_LOG_PATH}" 2>/dev/null \
              | grep -qiE 'connection refused|i/o timeout|tls handshake|no route to host|temporary failure|service unavailable|context deadline exceeded|cannot connect|dial tcp|server closed|unexpected EOF|connection reset'; then
              transient_match=true
            fi

            if [[ "${ssh_timeout_match}" == "true" || "${transient_match}" == "true" ]]; then
              backoff=$((60 * attempt))
              echo "==> Failure pattern looks transient (matched in the last 200 lines of this attempt). Retrying in ${backoff}s..."

              # -on-error=abort leaves the failed VM behind. We do NOT want
              # the next attempt to collide on vm_name (build_date is fixed
              # for the duration of a Packer invocation, so retries share the
              # name). Destroy any leftover VM(s) matching this build's glob
              # before sleeping. We intentionally leave VMs behind on the
              # FINAL attempt — that path falls through to the downstream
              # screenshot step, which grabs a PNG before "Destroy orphaned
              # VM" cleans up.
              vms=$(GOVC_URL='${{ secrets.VSPHERE_SERVER }}' \
                    GOVC_USERNAME='${{ secrets.VSPHERE_USER }}' \
                    GOVC_PASSWORD='${{ secrets.VSPHERE_PASSWORD }}' \
                    GOVC_INSECURE='${{ secrets.VSPHERE_INSECURE || 'false' }}' \
                    GOVC_DATACENTER='${{ secrets.VSPHERE_DATACENTER }}' \
                    govc find . -type m -name "${{ matrix.vm_glob }}" 2>/dev/null || true)
              if [[ -n "${vms}" ]]; then
                while IFS= read -r vm; do
                  [[ -z "${vm}" ]] && continue
                  echo "    Pre-retry cleanup: destroying leftover VM ${vm}"
                  GOVC_URL='${{ secrets.VSPHERE_SERVER }}' \
                    GOVC_USERNAME='${{ secrets.VSPHERE_USER }}' \
                    GOVC_PASSWORD='${{ secrets.VSPHERE_PASSWORD }}' \
                    GOVC_INSECURE='${{ secrets.VSPHERE_INSECURE || 'false' }}' \
                    GOVC_DATACENTER='${{ secrets.VSPHERE_DATACENTER }}' \
                    govc vm.power -off=true -force=true "${vm}" 2>/dev/null || true
                  GOVC_URL='${{ secrets.VSPHERE_SERVER }}' \
                    GOVC_USERNAME='${{ secrets.VSPHERE_USER }}' \
                    GOVC_PASSWORD='${{ secrets.VSPHERE_PASSWORD }}' \
                    GOVC_INSECURE='${{ secrets.VSPHERE_INSECURE || 'false' }}' \
                    GOVC_DATACENTER='${{ secrets.VSPHERE_DATACENTER }}' \
                    govc vm.destroy "${vm}" 2>/dev/null || true
                done <<< "${vms}"
              fi

              sleep ${backoff}
              attempt=$((attempt + 1))
            else
              echo "==> Failure does not match transient patterns in the last 200 lines of this attempt; not retrying."
              echo "==> Likely cause: validation error, provisioner script failure,"
              echo "    or vSphere config issue. Investigate the log above."
              exit "${rc}"
            fi
          done

      # ── Capture console screenshot of failing VM(s) ─────────────────────────
      # Runs BEFORE "Destroy orphaned VM" so the failing VM is still alive to
      # screenshot. The diagnostic poller tells us *what state* the VM is in
      # (CPU/mem/IP/bootTime) but not *what is on screen*. A screenshot of a
      # stuck install resolves all the ambiguity at once — is it a subiquity
      # error dialog? a kernel panic? a GRUB rescue prompt? a happy-path TUI
      # waiting for something we can't see?
      #
      # `govc vm.console -capture` opens a WebMKS console connection and grabs
      # one frame as PNG. Doesn't disturb the running guest. We capture every
      # non-template VM matching the build's vm_glob and upload as artefacts.
      - name: Capture console screenshot of failing VM
        if: (cancelled() || failure()) && needs.resolve-targets.outputs.dry_run == 'false'
        env:
          GOVC_URL:        ${{ secrets.VSPHERE_SERVER }}
          GOVC_USERNAME:   ${{ secrets.VSPHERE_USER }}
          GOVC_PASSWORD:   ${{ secrets.VSPHERE_PASSWORD }}
          GOVC_INSECURE:   ${{ secrets.VSPHERE_INSECURE || 'false' }}
          GOVC_DATACENTER: ${{ secrets.VSPHERE_DATACENTER }}
          NAME_PATTERN:    ${{ matrix.vm_glob }}
          SHOT_DIR:        screenshots-${{ matrix.label }}
        run: |
          mkdir -p "${SHOT_DIR}"
          echo "Searching for non-template VMs matching: ${NAME_PATTERN}"

          vms=$(govc find . -type m -name "${NAME_PATTERN}" 2>/dev/null || true)
          if [[ -z "${vms}" ]]; then
            echo "No VMs found — nothing to screenshot."
            exit 0
          fi

          _is_tpl='import sys,json;vms=(json.load(sys.stdin) or {}).get("VirtualMachines",[]);print("true" if vms and vms[0].get("Config",{}).get("Template",False) else "false")'

          ts=$(date -u +%Y%m%dT%H%M%SZ)
          while IFS= read -r vm_path; do
            [[ -z "${vm_path}" ]] && continue
            is_template=$(govc vm.info -json "${vm_path}" 2>/dev/null \
              | python3 -c "${_is_tpl}" 2>/dev/null || echo "unknown")
            if [[ "${is_template}" == "true" ]]; then
              echo "  Skipping (already a template): ${vm_path}"
              continue
            fi
            safe=$(echo "${vm_path}" | sed 's|/|_|g; s|^_||')
            out="${SHOT_DIR}/${ts}_${safe}.png"
            echo "  Capturing screenshot: ${vm_path} → ${out}"
            # vm.console -capture exits 0 on success; redirect stderr so any
            # WebMKS auth chatter is captured for debugging without failing
            # the step.
            if govc vm.console -capture "${out}" "${vm_path}" 2> "${SHOT_DIR}/${ts}_${safe}.stderr"; then
              echo "    ✔ ${out} ($(stat -c%s "${out}" 2>/dev/null || echo "?") bytes)"
            else
              echo "    ✘ screenshot failed — see ${SHOT_DIR}/${ts}_${safe}.stderr"
            fi
          done <<< "${vms}"

          ls -la "${SHOT_DIR}/" || true

      - name: Upload console screenshots
        if: (cancelled() || failure()) && needs.resolve-targets.outputs.dry_run == 'false'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: screenshots-${{ matrix.label }}-${{ github.run_number }}
          path: screenshots-${{ matrix.label }}/
          retention-days: 7
          if-no-files-found: ignore

      # ── Destroy orphaned VM on failure or cancellation ───────────────────────
      # Packer's -on-error=cleanup handles Packer-level errors but not GitHub
      # Actions cancellation. This step finds any VM matching the build name
      # pattern that was NOT converted to a template (i.e. the build did not
      # complete) and destroys it so vSphere is left clean.
      - name: Destroy orphaned VM
        if: cancelled() || failure()
        env:
          GOVC_URL:        ${{ secrets.VSPHERE_SERVER }}
          GOVC_USERNAME:   ${{ secrets.VSPHERE_USER }}
          GOVC_PASSWORD:   ${{ secrets.VSPHERE_PASSWORD }}
          GOVC_INSECURE:   ${{ secrets.VSPHERE_INSECURE || 'false' }}
          GOVC_DATACENTER: ${{ secrets.VSPHERE_DATACENTER }}
          NAME_PATTERN:    ${{ matrix.vm_glob }}
        run: |
          # vm_glob comes from the matrix entry (e.g. "ubuntu-2204-*",
          # "ubuntu-2604-desktop-*"). The trailing "-*" matches the build_date
          # suffix on VM names.
          echo "Searching for orphaned VMs matching: ${NAME_PATTERN}"

          vms=$(govc find . -type m -name "${NAME_PATTERN}" 2>/dev/null || true)
          if [[ -z "${vms}" ]]; then
            echo "No VMs found matching '${NAME_PATTERN}' — nothing to clean up."
            exit 0
          fi

          _is_tpl='import sys,json;vms=(json.load(sys.stdin) or {}).get("VirtualMachines",[]);print("true" if vms and vms[0].get("Config",{}).get("Template",False) else "false")'

          while IFS= read -r vm_path; do
            [[ -z "${vm_path}" ]] && continue
            is_template=$(govc vm.info -json "${vm_path}" 2>/dev/null \
              | python3 -c "${_is_tpl}" 2>/dev/null || echo "unknown")
            if [[ "${is_template}" == "true" ]]; then
              echo "  Skipping (already a template): ${vm_path}"
            else
              echo "  Powering off and destroying: ${vm_path}"
              govc vm.power -off=true -force=true "${vm_path}" 2>/dev/null || true
              govc vm.destroy "${vm_path}"
              echo "  ✔ Destroyed: ${vm_path}"
            fi
          done <<< "${vms}"

      # ── Upload logs ──────────────────────────────────────────────────────────
      - name: Upload Packer log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: packer-log-${{ matrix.label }}-${{ github.run_number }}
          path: packer-${{ matrix.label }}.log
          retention-days: 30

      # The manifest filename is keyed on the build {} `name` attribute. The
      # matrix carries this as `manifest` (e.g. ubuntu-2204, ubuntu-2604).
      - name: Upload build manifest
        if: success() && needs.resolve-targets.outputs.dry_run == 'false'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: manifest-${{ matrix.label }}-${{ github.run_number }}
          path: manifests/${{ matrix.manifest }}.json
          retention-days: 90

      # ── Capture build metrics ───────────────────────────────────────────────
      # Combine workflow-level metadata (duration, packer + plugin versions,
      # GitHub run/actor/event/sha) with the Packer manifest into a single
      # build-metrics-<label>.json artifact. Also renders a markdown summary
      # to $GITHUB_STEP_SUMMARY so the same data shows in the run UI without
      # downloading the artifact.
      #
      # Why a separate metrics file instead of stuffing into the manifest:
      # the manifest is Packer's own format; we don't own its schema. The
      # metrics file is ours, with a schema_version field, so we can evolve
      # it without coordinating with the post-processor.
      - name: Capture build metrics
        if: success() && needs.resolve-targets.outputs.dry_run == 'false'
        env:
          BUILD_START_EPOCH: ${{ steps.build-start.outputs.start_epoch }}
          LABEL: ${{ matrix.label }}
          VERSION: ${{ matrix.version }}
          MANIFEST_NAME: ${{ matrix.manifest }}
          # Must mirror PACKER_LOG_PATH on the "Packer build" step. Each
          # step has its own env scope, so we re-declare it rather than
          # implicitly inheriting. `set -u` below would abort otherwise.
          PACKER_LOG_PATH: packer-${{ matrix.label }}.log
        run: |
          set -euo pipefail
          end_epoch=$(date -u +%s)
          duration=$((end_epoch - BUILD_START_EPOCH))

          packer_version=$(packer version | head -1)
          plugin_versions=$(packer plugins installed 2>/dev/null || true)

          manifest_path="manifests/${MANIFEST_NAME}.json"
          jq_manifest_args=()
          manifest_data_expr='null'
          if [[ -f "${manifest_path}" ]]; then
            build_count=$(jq '.builds | length' "${manifest_path}")
            jq_manifest_args=(--slurpfile manifest_data "${manifest_path}")
            manifest_data_expr='$manifest_data[0]'
          else
            build_count=0
          fi

          # ── Extract guest build-info(s) from the Packer log ──
          # setup.sh emits the JSON between sentinel markers. Combined builds
          # (server + desktop in one packer process) produce two such blocks
          # in the same log; both are captured into an array.
          guest_info_file=$(mktemp)
          awk '/PACKER_BUILD_INFO_BEGIN/{p=1; next} /PACKER_BUILD_INFO_END/{p=0; print "---DOC---"; next} p' \
            "${PACKER_LOG_PATH}" 2>/dev/null > "${guest_info_file}" || true
          # Each marker pair becomes one JSON document; jq -s joins them.
          guest_info_args=(--argjson guest_build_info '[]')
          if [[ -s "${guest_info_file}" ]]; then
            # Split on ---DOC---, parse each chunk that's non-empty.
            python3 - "${guest_info_file}" > "${guest_info_file}.json" <<'PY'
          import json
          import sys
          data = open(sys.argv[1]).read()
          docs = []
          for chunk in data.split("---DOC---"):
              chunk = chunk.strip()
              if not chunk:
                  continue
              try:
                  docs.append(json.loads(chunk))
              except json.JSONDecodeError:
                  pass
          print(json.dumps(docs))
          PY
            if [[ -s "${guest_info_file}.json" ]]; then
              guest_info_args=(--slurpfile guest_build_info "${guest_info_file}.json")
            fi
          fi
          rm -f "${guest_info_file}" "${guest_info_file}.json"

          started_iso=$(date -u -d "@${BUILD_START_EPOCH}" +%Y-%m-%dT%H:%M:%SZ)
          completed_iso=$(date -u -d "@${end_epoch}" +%Y-%m-%dT%H:%M:%SZ)
          duration_human=$(printf '%dh%02dm%02ds' \
            $((duration / 3600)) $((duration % 3600 / 60)) $((duration % 60)))
          short_sha=$(printf '%s' "${GITHUB_SHA}" | cut -c1-8)

          # If guest_build_info was supplied via --slurpfile, it's an array
          # already (one element wrapping the array). Otherwise it's the
          # default empty array passed via --argjson.
          if [[ "${guest_info_args[0]}" == "--slurpfile" ]]; then
            guest_info_expr='$guest_build_info[0]'
          else
            guest_info_expr='$guest_build_info'
          fi

          # shellcheck disable=SC2016
          jq -n "${jq_manifest_args[@]}" "${guest_info_args[@]}" \
            --arg label            "${LABEL}" \
            --arg version          "${VERSION}" \
            --arg manifest         "${MANIFEST_NAME}" \
            --argjson build_count  "${build_count}" \
            --argjson duration     "${duration}" \
            --arg duration_human   "${duration_human}" \
            --arg started_at       "${started_iso}" \
            --arg completed_at     "${completed_iso}" \
            --arg packer_version   "${packer_version}" \
            --arg plugin_versions  "${plugin_versions}" \
            --arg run_id           "${GITHUB_RUN_ID}" \
            --argjson run_number   "${GITHUB_RUN_NUMBER}" \
            --arg actor            "${GITHUB_ACTOR}" \
            --arg event            "${GITHUB_EVENT_NAME}" \
            --arg sha              "${GITHUB_SHA}" \
            --arg ref              "${GITHUB_REF}" \
            "{
              schema_version: 2,
              label: \$label,
              version: \$version,
              manifest: \$manifest,
              build_count: \$build_count,
              duration_seconds: \$duration,
              duration_human: \$duration_human,
              started_at: \$started_at,
              completed_at: \$completed_at,
              packer_version: \$packer_version,
              plugin_versions: \$plugin_versions,
              github: {
                run_id: \$run_id,
                run_number: \$run_number,
                actor: \$actor,
                event: \$event,
                sha: \$sha,
                ref: \$ref
              },
              guest_build_info: ${guest_info_expr},
              manifest_data: ${manifest_data_expr}
            }" > "build-metrics-${LABEL}.json"

          echo "Wrote build-metrics-${LABEL}.json:"
          jq . "build-metrics-${LABEL}.json"

          # Markdown summary for the workflow run UI.
          {
            echo "## Build metrics — \`${LABEL}\`"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Duration | ${duration_human} (${duration}s) |"
            echo "| Builds completed | ${build_count} |"
            echo "| Packer | ${packer_version} |"
            echo "| Started | ${started_iso} |"
            echo "| Completed | ${completed_iso} |"
            echo "| Triggered by | @${GITHUB_ACTOR} via \`${GITHUB_EVENT_NAME}\` |"
            echo "| Commit | \`${short_sha}\` |"
            echo "| Run | [#${GITHUB_RUN_NUMBER}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}) |"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload build metrics
        if: success() && needs.resolve-targets.outputs.dry_run == 'false'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-metrics-${{ matrix.label }}-${{ github.run_number }}
          path: build-metrics-${{ matrix.label }}.json
          retention-days: 90

      # ── Prune old templates ─────────────────────────────────────────────────
      # Lifecycle policy: retain the most recent N templates per (version, type)
      # group and destroy the rest. Without this, every weekly build leaves a
      # fresh dated template in vSphere forever — ~52 per variant per year.
      #
      # Implementation lives in scripts/prune-templates.sh and is also called
      # by the standalone rotate-templates.yml workflow on a monthly schedule.
      #
      # Configurable via repo variables:
      #   TEMPLATE_RETENTION_COUNT  — how many to keep per group  (default: 2,
      #                                i.e. current + one rollback target)
      #   TEMPLATE_PRUNE_DRY_RUN    — "true" prints intent but does not destroy
      #                                (default: false). Use this on first
      #                                roll-out to confirm the right entries
      #                                are being identified.
      #
      # Note: this in-build prune runs in the same job as `packer build` so it
      # only sees templates that match THIS matrix entry's vm_glob (server xor
      # desktop xor both, depending on the build target). The standalone
      # rotate-templates.yml workflow prunes ALL groups in one pass.
      - name: Prune old templates
        if: success() && needs.resolve-targets.outputs.dry_run == 'false'
        env:
          GOVC_URL:        ${{ secrets.VSPHERE_SERVER }}
          GOVC_USERNAME:   ${{ secrets.VSPHERE_USER }}
          GOVC_PASSWORD:   ${{ secrets.VSPHERE_PASSWORD }}
          GOVC_INSECURE:   ${{ secrets.VSPHERE_INSECURE || 'false' }}
          GOVC_DATACENTER: ${{ secrets.VSPHERE_DATACENTER }}
          NAME_PATTERN:    ${{ matrix.vm_glob }}
          RETAIN:          ${{ vars.TEMPLATE_RETENTION_COUNT || '2' }}
          DRY_RUN:         ${{ vars.TEMPLATE_PRUNE_DRY_RUN || 'false' }}
        run: bash scripts/prune-templates.sh

      # ── Slack notifications ──────────────────────────────────────────────────
      - name: Notify Slack — success
        if: success() && needs.resolve-targets.outputs.dry_run == 'false'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          [[ -z "${SLACK_WEBHOOK_URL}" ]] && { echo "SLACK_WEBHOOK_URL not set — skipping."; exit 0; }
          curl -fsSL -X POST "${SLACK_WEBHOOK_URL}" \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \"✅ *Packer build succeeded* — \`ubuntu-${{ matrix.label }}\`\",
              \"attachments\": [{
                \"color\": \"good\",
                \"fields\": [
                  { \"title\": \"Template\",    \"value\": \"ubuntu-${{ matrix.label }}\", \"short\": true },
                  { \"title\": \"Triggered by\", \"value\": \"${{ github.actor }}\",         \"short\": true },
                  { \"title\": \"Run\",
                    \"value\": \"<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|#${{ github.run_number }}>\",
                    \"short\": true }
                ]
              }]
            }"

      - name: Notify Slack — failure
        if: failure() || cancelled()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
        run: |
          [[ -z "${SLACK_WEBHOOK_URL}" ]] && { echo "SLACK_WEBHOOK_URL not set — skipping."; exit 0; }
          EMOJI="❌"
          [[ "${JOB_STATUS}" == "cancelled" ]] && EMOJI="⚠️"
          curl -fsSL -X POST "${SLACK_WEBHOOK_URL}" \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \"${EMOJI} *Packer build ${JOB_STATUS}* — \`ubuntu-${{ matrix.label }}\`\",
              \"attachments\": [{
                \"color\": \"danger\",
                \"fields\": [
                  { \"title\": \"Template\",    \"value\": \"ubuntu-${{ matrix.label }}\", \"short\": true },
                  { \"title\": \"Triggered by\", \"value\": \"${{ github.actor }}\",         \"short\": true },
                  { \"title\": \"Run\",
                    \"value\": \"<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|#${{ github.run_number }}>\",
                    \"short\": true }
                ]
              }]
            }"

      # ── Always clean up credentials ──────────────────────────────────────────
      - name: Remove variables file
        if: always()
        run: rm -f runner.pkrvars.hcl

      - name: Remove ephemeral build SSH keypair
        if: always()
        run: |
          if [[ -n "${{ steps.build-keypair.outputs.private_key_path }}" ]]; then
            rm -rf "$(dirname "${{ steps.build-keypair.outputs.private_key_path }}")"
            echo "Wiped ephemeral keypair directory."
          fi

  # ── Post-publish smoke test ─────────────────────────────────────────────────
  # Closes the regression-class gap left by the in-build goss pass: that one
  # runs BEFORE Packer converts the VM to a template, so it cannot exercise
  # first-boot oneshot ordering, cloud-init neutralisation, or open-vm-tools
  # surviving the template conversion. This job clones the just-built
  # template, boots it, injects an ephemeral pubkey via VMware Tools guest
  # ops (password SSH auth is disabled by finalize.sh), SSHes in, and re-runs
  # goss against the spec. Cleans up the clone in an EXIT trap regardless of
  # pass/fail.
  #
  # Matrix: one entry per (version, role) — combined builds fan out so each
  # produced template gets its own smoke run.
  smoke:
    name: Smoke ubuntu-${{ matrix.label }}
    needs: [resolve-targets, build]
    if: success() && needs.resolve-targets.outputs.dry_run == 'false'
    runs-on: ${{ vars.RUNNER_LABEL || 'self-hosted' }}
    timeout-minutes: 30

    strategy:
      matrix: ${{ fromJson(needs.resolve-targets.outputs.smoke_matrix) }}
      fail-fast: false
      max-parallel: 1

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Best-effort auto-install — see comment on the earlier Install govc step.
      - name: Install govc
        continue-on-error: true
        run: |
          if command -v govc &>/dev/null; then
            echo "govc already installed: $(govc version)"
            exit 0
          fi
          echo "govc not installed — attempting best-effort auto-install (requires sudo)."
          echo "If this fails, pre-install per docs/operations.md → Setting up the runner."
          GOVC_VERSION=$(curl -fsSL https://api.github.com/repos/vmware/govmomi/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4)
          curl -fsSL \
            "https://github.com/vmware/govmomi/releases/download/${GOVC_VERSION}/govc_Linux_x86_64.tar.gz" \
            | sudo tar -xzf - -C /usr/local/bin govc
          sudo chmod +x /usr/local/bin/govc
          echo "govc installed: $(govc version)"

      - name: Run smoke test against cloned template
        env:
          GOVC_URL:          ${{ secrets.VSPHERE_SERVER }}
          GOVC_USERNAME:     ${{ secrets.VSPHERE_USER }}
          GOVC_PASSWORD:     ${{ secrets.VSPHERE_PASSWORD }}
          GOVC_INSECURE:     ${{ secrets.VSPHERE_INSECURE || 'false' }}
          GOVC_DATACENTER:   ${{ secrets.VSPHERE_DATACENTER }}
          VSPHERE_FOLDER:    ${{ secrets.VSPHERE_FOLDER || 'packer' }}
          VSPHERE_CLUSTER:   ${{ secrets.VSPHERE_CLUSTER }}
          VSPHERE_HOST:      ${{ secrets.VSPHERE_HOST }}
          VSPHERE_DATASTORE: ${{ secrets.VSPHERE_DATASTORE }}
          BUILD_USERNAME:    ${{ secrets.BUILD_USERNAME }}
          BUILD_PASSWORD:    ${{ secrets.BUILD_PASSWORD }}
          TEMPLATE_PATTERN:  ${{ matrix.glob }}
          GOSS_SPEC:         ${{ matrix.goss_spec }}
          # smoke-test.sh writes PNGs here on failure (govc vm.console -capture
          # works even when guest.run / VMware Tools can't respond — covers the
          # "clone never reached userspace" failure mode where the diagnostic
          # dump can't surface anything).
          SMOKE_SCREENSHOT_DIR: ./smoke-screenshots-${{ matrix.label }}
        run: bash scripts/smoke-test.sh

      # ── Upload smoke console screenshots ─────────────────────────────────────
      # Only fires on smoke failure; captures whatever the clone's video output
      # was when smoke gave up — kernel panic, blank screen, login prompt, etc.
      - name: Upload smoke console screenshot
        if: failure() && needs.resolve-targets.outputs.dry_run == 'false'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: smoke-screenshots-${{ matrix.label }}-${{ github.run_number }}
          path: smoke-screenshots-${{ matrix.label }}/
          retention-days: 7
          if-no-files-found: ignore

      # ── Auto-quarantine the just-built template on smoke failure ─────────────
      # Without this step, a smoke-failed template stays live in the build
      # folder and any clone consumer (jenkins job, dev workstation, IaC tool)
      # can pick it up and inherit the regression. quarantine-template.sh
      # renames the template with a -quarantined-r<RUN> suffix, moves it into
      # <VSPHERE_FOLDER>/quarantine/, and stamps the failing run's URL into the
      # VM annotation so an operator inspecting the entry in vSphere can jump
      # back to the build logs. prune-templates.sh ignores the quarantine
      # subfolder so these never get auto-destroyed — they sit until an
      # operator decides what to do with them.
      - name: Quarantine failed template
        if: failure() && needs.resolve-targets.outputs.dry_run == 'false'
        env:
          GOVC_URL:         ${{ secrets.VSPHERE_SERVER }}
          GOVC_USERNAME:    ${{ secrets.VSPHERE_USER }}
          GOVC_PASSWORD:    ${{ secrets.VSPHERE_PASSWORD }}
          GOVC_INSECURE:    ${{ secrets.VSPHERE_INSECURE || 'false' }}
          GOVC_DATACENTER:  ${{ secrets.VSPHERE_DATACENTER }}
          VSPHERE_FOLDER:   ${{ secrets.VSPHERE_FOLDER || 'packer' }}
          TEMPLATE_PATTERN: ${{ matrix.glob }}
          RUN_NUMBER:       ${{ github.run_number }}
          RUN_URL:          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash scripts/quarantine-template.sh
