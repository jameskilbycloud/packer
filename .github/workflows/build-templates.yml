name: Build Packer Templates

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  # Manual build — choose exactly what to build and optionally override sizing
  workflow_dispatch:
    inputs:
      build_target:
        description: "Template(s) to build"
        required: true
        default: "2404-server"
        type: choice
        options:
          - 2204-server
          - 2204-desktop
          - 2404-server
          - 2404-desktop
          - 2604-server
          - 2604-desktop
          - windows-server-2022
          - windows-server-2025
          - windows-10
          - all-linux
          - all-servers
          - all-desktops
          - all-windows
          - all

      dry_run:
        description: "Validate only — do not build"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  # Auto-rebuild templates every Sunday at 02:00 UTC (catches security updates)
  # Comment out or adjust the cron if you do not want automatic rebuilds.
  schedule:
    - cron: "0 2 * * 0"

  # Note: push validation is handled by validate.yml (syntax check only, no
  # vSphere connection). The push trigger has been removed from this workflow
  # to prevent unintended full builds on every code change — use
  # workflow_dispatch to trigger a deliberate build.

# ── Concurrency ───────────────────────────────────────────────────────────────
# Workflow-level serialisation — only one Packer build run at a time. Inside a
# single run, parallelism happens at the Packer level (one `build {}` block
# with multiple sources + `-parallel-builds=N`), not via the matrix. Using a
# workflow-level concurrency group means a second `workflow_dispatch` queues
# instead of stomping on an in-flight build.
concurrency:
  group: packer-build
  cancel-in-progress: false   # queue rather than cancel — don't orphan VMs

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:

  # ── Resolve which builds to run based on the trigger / input ────────────────
  resolve-targets:
    name: Resolve build targets
    runs-on: ${{ vars.RUNNER_LABEL || 'self-hosted' }}
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      dry_run: ${{ steps.set-dry-run.outputs.dry_run }}

    steps:
      - name: Set dry-run flag
        id: set-dry-run
        run: |
          # workflow_dispatch sets the input; push/schedule always build for real
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "dry_run=${{ github.event.inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set build matrix
        id: set-matrix
        run: |
          TARGET="${{ github.event.inputs.build_target }}"

          # Default for schedule / push triggers
          if [[ -z "${TARGET}" ]]; then
            TARGET="all"
          fi

          # Each matrix entry has:
          #   version  — Ubuntu major version (used for VM-name globs, manifest
          #              filename, log filename, friendly Slack name).
          #   only     — Packer `-only` glob. For combined builds, use the
          #              build name `ubuntu-XXXX.*` so both sources run; for
          #              single-target builds, name the source explicitly.
          #   parallel — value for `-parallel-builds`. 2 for combined (server
          #              + desktop together), 1 for single-target (no need to
          #              spawn a second worker).
          #   label    — short human label for log/manifest artifact names.
          # Windows entries use "version":"win{label}" so the matrix step can
          # tell Linux and Windows apart when resolving ISO paths and naming
          # the manifest artifact.
          # Each matrix entry carries:
          #   version  — "2204"/"2404"/"2604" (Ubuntu) or "win-srv-2022"/"win-srv-2025"/"win-10"
          #   label    — short human label used in artifact names
          #   only     — Packer -only glob
          #   parallel — value for -parallel-builds
          #   manifest — manifest filename stem (matches `name` in build {} block)
          #   vm_glob  — VM-name pattern used when destroying orphans on failure
          case "${TARGET}" in
            2204-server)  BUILDS='[{"version":"2204","label":"2204-server", "only":"ubuntu-2204.vsphere-iso.ubuntu-2204-server", "parallel":1,"manifest":"ubuntu-2204","vm_glob":"ubuntu-2204-server-*"}]' ;;
            2204-desktop) BUILDS='[{"version":"2204","label":"2204-desktop","only":"ubuntu-2204.vsphere-iso.ubuntu-2204-desktop","parallel":1,"manifest":"ubuntu-2204","vm_glob":"ubuntu-2204-desktop-*"}]' ;;
            2404-server)  BUILDS='[{"version":"2404","label":"2404-server", "only":"ubuntu-2404.vsphere-iso.ubuntu-2404-server", "parallel":1,"manifest":"ubuntu-2404","vm_glob":"ubuntu-2404-server-*"}]' ;;
            2404-desktop) BUILDS='[{"version":"2404","label":"2404-desktop","only":"ubuntu-2404.vsphere-iso.ubuntu-2404-desktop","parallel":1,"manifest":"ubuntu-2404","vm_glob":"ubuntu-2404-desktop-*"}]' ;;
            2604-server)  BUILDS='[{"version":"2604","label":"2604-server", "only":"ubuntu-2604.vsphere-iso.ubuntu-2604-server", "parallel":1,"manifest":"ubuntu-2604","vm_glob":"ubuntu-2604-server-*"}]' ;;
            2604-desktop) BUILDS='[{"version":"2604","label":"2604-desktop","only":"ubuntu-2604.vsphere-iso.ubuntu-2604-desktop","parallel":1,"manifest":"ubuntu-2604","vm_glob":"ubuntu-2604-desktop-*"}]' ;;
            windows-server-2022) BUILDS='[{"version":"win-srv-2022","label":"windows-server-2022","only":"windows-server-2022.*","parallel":1,"manifest":"windows-server-2022","vm_glob":"windows-server-2022-*"}]' ;;
            windows-server-2025) BUILDS='[{"version":"win-srv-2025","label":"windows-server-2025","only":"windows-server-2025.*","parallel":1,"manifest":"windows-server-2025","vm_glob":"windows-server-2025-*"}]' ;;
            windows-10)          BUILDS='[{"version":"win-10",      "label":"windows-10",          "only":"windows-10.*",          "parallel":1,"manifest":"windows-10",          "vm_glob":"windows-10-*"}]' ;;
            all-linux)    BUILDS='[
                            {"version":"2204","label":"2204","only":"ubuntu-2204.*","parallel":2,"manifest":"ubuntu-2204","vm_glob":"ubuntu-2204-*"},
                            {"version":"2404","label":"2404","only":"ubuntu-2404.*","parallel":2,"manifest":"ubuntu-2404","vm_glob":"ubuntu-2404-*"},
                            {"version":"2604","label":"2604","only":"ubuntu-2604.*","parallel":2,"manifest":"ubuntu-2604","vm_glob":"ubuntu-2604-*"}
                          ]' ;;
            all-servers)  BUILDS='[
                            {"version":"2204","label":"2204-server","only":"ubuntu-2204.vsphere-iso.ubuntu-2204-server","parallel":1,"manifest":"ubuntu-2204","vm_glob":"ubuntu-2204-server-*"},
                            {"version":"2404","label":"2404-server","only":"ubuntu-2404.vsphere-iso.ubuntu-2404-server","parallel":1,"manifest":"ubuntu-2404","vm_glob":"ubuntu-2404-server-*"},
                            {"version":"2604","label":"2604-server","only":"ubuntu-2604.vsphere-iso.ubuntu-2604-server","parallel":1,"manifest":"ubuntu-2604","vm_glob":"ubuntu-2604-server-*"},
                            {"version":"win-srv-2022","label":"windows-server-2022","only":"windows-server-2022.*","parallel":1,"manifest":"windows-server-2022","vm_glob":"windows-server-2022-*"},
                            {"version":"win-srv-2025","label":"windows-server-2025","only":"windows-server-2025.*","parallel":1,"manifest":"windows-server-2025","vm_glob":"windows-server-2025-*"}
                          ]' ;;
            all-desktops) BUILDS='[
                            {"version":"2204","label":"2204-desktop","only":"ubuntu-2204.vsphere-iso.ubuntu-2204-desktop","parallel":1,"manifest":"ubuntu-2204","vm_glob":"ubuntu-2204-desktop-*"},
                            {"version":"2404","label":"2404-desktop","only":"ubuntu-2404.vsphere-iso.ubuntu-2404-desktop","parallel":1,"manifest":"ubuntu-2404","vm_glob":"ubuntu-2404-desktop-*"},
                            {"version":"2604","label":"2604-desktop","only":"ubuntu-2604.vsphere-iso.ubuntu-2604-desktop","parallel":1,"manifest":"ubuntu-2604","vm_glob":"ubuntu-2604-desktop-*"},
                            {"version":"win-10","label":"windows-10","only":"windows-10.*","parallel":1,"manifest":"windows-10","vm_glob":"windows-10-*"}
                          ]' ;;
            all-windows)  BUILDS='[
                            {"version":"win-srv-2022","label":"windows-server-2022","only":"windows-server-2022.*","parallel":1,"manifest":"windows-server-2022","vm_glob":"windows-server-2022-*"},
                            {"version":"win-srv-2025","label":"windows-server-2025","only":"windows-server-2025.*","parallel":1,"manifest":"windows-server-2025","vm_glob":"windows-server-2025-*"},
                            {"version":"win-10","label":"windows-10","only":"windows-10.*","parallel":1,"manifest":"windows-10","vm_glob":"windows-10-*"}
                          ]' ;;
            all)          BUILDS='[
                            {"version":"2204","label":"2204","only":"ubuntu-2204.*","parallel":2,"manifest":"ubuntu-2204","vm_glob":"ubuntu-2204-*"},
                            {"version":"2404","label":"2404","only":"ubuntu-2404.*","parallel":2,"manifest":"ubuntu-2404","vm_glob":"ubuntu-2404-*"},
                            {"version":"2604","label":"2604","only":"ubuntu-2604.*","parallel":2,"manifest":"ubuntu-2604","vm_glob":"ubuntu-2604-*"},
                            {"version":"win-srv-2022","label":"windows-server-2022","only":"windows-server-2022.*","parallel":1,"manifest":"windows-server-2022","vm_glob":"windows-server-2022-*"},
                            {"version":"win-srv-2025","label":"windows-server-2025","only":"windows-server-2025.*","parallel":1,"manifest":"windows-server-2025","vm_glob":"windows-server-2025-*"},
                            {"version":"win-10","label":"windows-10","only":"windows-10.*","parallel":1,"manifest":"windows-10","vm_glob":"windows-10-*"}
                          ]' ;;
            *)            BUILDS='[{"version":"2404","label":"2404-server","only":"ubuntu-2404.vsphere-iso.ubuntu-2404-server","parallel":1,"manifest":"ubuntu-2404","vm_glob":"ubuntu-2404-server-*"}]' ;;
          esac

          # Collapse multi-line JSON onto one line so GitHub-Actions parses it.
          BUILDS_ONELINE=$(echo "${BUILDS}" | tr -d '\n' | tr -s ' ')
          echo "matrix={\"include\":${BUILDS_ONELINE}}" >> "$GITHUB_OUTPUT"
          echo "Resolved targets: ${BUILDS_ONELINE}"

  # ── Packer build (one job per matrix entry) ─────────────────────────────────
  # For "all" builds, each matrix entry covers a whole Ubuntu version (server +
  # desktop) and Packer runs both sources in parallel inside that one job. For
  # single-target inputs (e.g. "2404-server") the matrix entry has parallel=1
  # and `only` names just one source.
  build:
    name: Build ubuntu-${{ matrix.label }}
    needs: resolve-targets
    runs-on: ${{ vars.RUNNER_LABEL || 'self-hosted' }}
    timeout-minutes: 240              # combined builds: server (~90m) and desktop (~140m) run in parallel — wall-clock ~140m + buffer

    strategy:
      matrix: ${{ fromJson(needs.resolve-targets.outputs.matrix) }}
      fail-fast: false   # let other matrix entries continue if one fails
      max-parallel: 1    # one Packer process per runner — vSphere parallelism is inside the process

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Verify required secrets are present ─────────────────────────────────
      # Fail fast with a clear message rather than letting Packer error on
      # cryptic vcenter_server / username / password / host / ssh_username errors.
      - name: Check required secrets
        env:
          MATRIX_VERSION:    ${{ matrix.version }}
          VSPHERE_SERVER:    ${{ secrets.VSPHERE_SERVER }}
          VSPHERE_USER:      ${{ secrets.VSPHERE_USER }}
          VSPHERE_PASSWORD:  ${{ secrets.VSPHERE_PASSWORD }}
          VSPHERE_DATACENTER: ${{ secrets.VSPHERE_DATACENTER }}
          VSPHERE_DATASTORE: ${{ secrets.VSPHERE_DATASTORE }}
          VSPHERE_NETWORK:   ${{ secrets.VSPHERE_NETWORK }}
          VSPHERE_CLUSTER:   ${{ secrets.VSPHERE_CLUSTER }}
          VSPHERE_HOST:      ${{ secrets.VSPHERE_HOST }}
          VSPHERE_ISO_LIBRARY_DATASTORE: ${{ secrets.VSPHERE_ISO_LIBRARY_DATASTORE }}
          BUILD_USERNAME:    ${{ secrets.BUILD_USERNAME }}
          BUILD_PASSWORD:    ${{ secrets.BUILD_PASSWORD }}
          BUILD_PASSWORD_ENCRYPTED: ${{ secrets.BUILD_PASSWORD_ENCRYPTED }}
          WINDOWS_ADMIN_PASSWORD: ${{ secrets.WINDOWS_ADMIN_PASSWORD }}
        run: |
          missing=()

          # Core connection — all required
          [[ -z "${VSPHERE_SERVER}"    ]] && missing+=("VSPHERE_SERVER")
          [[ -z "${VSPHERE_USER}"      ]] && missing+=("VSPHERE_USER")
          [[ -z "${VSPHERE_PASSWORD}"  ]] && missing+=("VSPHERE_PASSWORD")
          [[ -z "${VSPHERE_DATACENTER}" ]] && missing+=("VSPHERE_DATACENTER")
          [[ -z "${VSPHERE_DATASTORE}" ]] && missing+=("VSPHERE_DATASTORE")
          [[ -z "${VSPHERE_NETWORK}"   ]] && missing+=("VSPHERE_NETWORK")
          # Datastore that backs the Content Library (ISOs are resolved from it at runtime)
          [[ -z "${VSPHERE_ISO_LIBRARY_DATASTORE}" ]] && missing+=("VSPHERE_ISO_LIBRARY_DATASTORE")

          # At least one of VSPHERE_HOST or VSPHERE_CLUSTER must be set
          if [[ -z "${VSPHERE_HOST}" && -z "${VSPHERE_CLUSTER}" ]]; then
            missing+=("VSPHERE_HOST (or VSPHERE_CLUSTER — at least one required)")
          fi

          # Linux build credentials always required because variables.pkr.hcl
          # declares them with no default. Windows-only runs still need them
          # set (any non-empty placeholder is fine; Packer only reads the ones
          # used by the selected `-only` source).
          [[ -z "${BUILD_USERNAME}"   ]] && missing+=("BUILD_USERNAME")
          [[ -z "${BUILD_PASSWORD}"   ]] && missing+=("BUILD_PASSWORD")
          [[ -z "${BUILD_PASSWORD_ENCRYPTED}" ]] && missing+=("BUILD_PASSWORD_ENCRYPTED")

          # Windows admin password is required when this matrix entry targets
          # a Windows source. The variable is declared without a default, so
          # `packer validate` fails for any Windows -only filter unless set.
          if [[ "${MATRIX_VERSION}" == win-* ]]; then
            [[ -z "${WINDOWS_ADMIN_PASSWORD}" ]] && missing+=("WINDOWS_ADMIN_PASSWORD (required for Windows builds)")
          fi

          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "❌ The following required secrets are not set:"
            for s in "${missing[@]}"; do
              echo "   • ${s}"
            done
            echo ""
            echo "Set them via: Settings → Secrets and variables → Actions"
            echo "Or run: make secrets  (reads from variables.pkrvars.hcl)"
            exit 1
          fi

          echo "✅ All required secrets are present."

      # ── Install Packer ───────────────────────────────────────────────────────
      - name: Install Packer
        run: |
          if command -v packer &>/dev/null; then
            echo "Packer already installed: $(packer version)"
            exit 0
          fi
          # Install via direct binary download — avoids APT codename mismatches
          # (e.g. pre-release Ubuntu codenames not yet in HashiCorp's repo)
          PACKER_VERSION=$(curl -fsSL https://api.releases.hashicorp.com/v1/releases/packer/latest \
            | grep -o '"version":"[^"]*"' | head -1 | cut -d'"' -f4)
          ARCH=$(dpkg --print-architecture)
          curl -fsSL "https://releases.hashicorp.com/packer/${PACKER_VERSION}/packer_${PACKER_VERSION}_linux_${ARCH}.zip" \
            -o /tmp/packer.zip
          python3 -c "import zipfile,sys; zipfile.ZipFile('/tmp/packer.zip').extract('packer','/tmp')"
          sudo mv /tmp/packer /usr/local/bin/packer
          sudo chmod +x /usr/local/bin/packer
          rm /tmp/packer.zip
          packer version

      # ── Install xorriso (required for cloud-init CD image creation) ─────────
      - name: Install xorriso
        run: |
          if ! command -v xorriso &>/dev/null; then
            # Ignore update errors — broken third-party repos (e.g. HashiCorp for
            # pre-release Ubuntu codenames) must not block the standard repo install.
            sudo apt-get update -qq 2>/dev/null || true
            sudo apt-get install -y xorriso
          fi
          echo "xorriso: $(xorriso --version 2>&1 | head -1)"

      # ── Install govc (required to resolve Content Library ISO paths) ──────────
      - name: Install govc
        run: |
          if command -v govc &>/dev/null; then
            echo "govc already installed: $(govc version)"
            exit 0
          fi
          GOVC_VERSION=$(curl -fsSL https://api.github.com/repos/vmware/govmomi/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4)
          curl -fsSL \
            "https://github.com/vmware/govmomi/releases/download/${GOVC_VERSION}/govc_Linux_x86_64.tar.gz" \
            | sudo tar -xzf - -C /usr/local/bin govc
          sudo chmod +x /usr/local/bin/govc
          echo "govc installed: $(govc version)"

      # ── Resolve Content Library ISO paths via govc library.info ─────────────
      # Content Library items live at contentlib-{lib-uuid}/{item-uuid}/{file}
      # on the backing datastore. We get the UUIDs via govc library.info -json
      # (which uses the vSphere SDK, not the REST API) and construct the path.
      - name: Resolve ISO paths from Content Library
        env:
          GOVC_URL:        ${{ secrets.VSPHERE_SERVER }}
          GOVC_USERNAME:   ${{ secrets.VSPHERE_USER }}
          GOVC_PASSWORD:   ${{ secrets.VSPHERE_PASSWORD }}
          GOVC_INSECURE:   ${{ secrets.VSPHERE_INSECURE || 'false' }}
          GOVC_DATACENTER: ${{ secrets.VSPHERE_DATACENTER }}
          LIB_DATASTORE:   ${{ secrets.VSPHERE_ISO_LIBRARY_DATASTORE }}
          CONTENT_LIBRARY: ${{ vars.CONTENT_LIBRARY || 'Packer-ISOs' }}
          MATRIX_VERSION:  ${{ matrix.version }}
          # Windows ISO filenames come from secrets because the actual filename
          # varies (Eval Center vs licensed media, language SKU, build number).
          WIN_SRV_2022_ISO: ${{ secrets.WINDOWS_SERVER_2022_ISO }}
          WIN_SRV_2025_ISO: ${{ secrets.WINDOWS_SERVER_2025_ISO }}
          WIN_10_ISO:       ${{ secrets.WINDOWS_10_ISO }}
        run: |
          declare -A ISO_ITEMS=(
            [2204]="ubuntu-22.04.5-live-server-amd64.iso"
            [2404]="ubuntu-24.04.4-live-server-amd64.iso"
            [2604]="ubuntu-26.04-live-server-amd64.iso"
          )
          # Windows entries are added only when the corresponding secret is
          # set. This keeps Linux-only deployments unaffected by Windows config.
          [[ -n "${WIN_SRV_2022_ISO}" ]] && ISO_ITEMS[win-srv-2022]="${WIN_SRV_2022_ISO}"
          [[ -n "${WIN_SRV_2025_ISO}" ]] && ISO_ITEMS[win-srv-2025]="${WIN_SRV_2025_ISO}"
          [[ -n "${WIN_10_ISO}"       ]] && ISO_ITEMS[win-10]="${WIN_10_ISO}"
          declare -A RESOLVED=()

          # ── Confirm library exists and list its contents ───────────────────
          echo "Library '${CONTENT_LIBRARY}' items:"
          govc library.ls "/${CONTENT_LIBRARY}/" 2>/dev/null | sed 's/^/  /' || true

          if [[ -z "$(govc library.ls "/${CONTENT_LIBRARY}" 2>/dev/null)" ]]; then
            echo "❌ Content Library '${CONTENT_LIBRARY}' not found. Available libraries:"
            govc library.ls 2>/dev/null | sed 's/^/   /' || echo "   (none visible)"
            echo "   Run the upload-isos workflow first, or fix the CONTENT_LIBRARY repo variable."
            exit 1
          fi

          # ── Get library UUID from govc library.info -json ─────────────────
          _pick_id='import sys,json;d=(json.load(sys.stdin) or [{}])[0];print(d.get("ID",d.get("id","")))'
          lib_id=$(govc library.info -json "/${CONTENT_LIBRARY}" 2>/dev/null \
            | python3 -c "${_pick_id}" 2>/dev/null || echo "")
          echo "Library UUID: ${lib_id:-NOT FOUND}"

          # ── For each ISO: get item UUID and construct the datastore path ───
          echo "ISO_BACKING_DATASTORE=${LIB_DATASTORE}" >> "$GITHUB_ENV"

          # Iterate every key in ISO_ITEMS so Windows entries are resolved when
          # their secrets are set. Each result is exported as an env var named
          # RESOLVED_ISO_<KEY>, where <KEY> is uppercased with dashes turned
          # into underscores (GitHub env-var names cannot contain dashes).
          # e.g. win-srv-2022 → RESOLVED_ISO_WIN_SRV_2022.
          for ver in "${!ISO_ITEMS[@]}"; do
            item="${ISO_ITEMS[$ver]}"
            item_stem="${item%.iso}"
            ver_key="${ver^^}"; ver_key="${ver_key//-/_}"

            # Try exact name first, then stem without extension
            item_id=$(govc library.info -json "/${CONTENT_LIBRARY}/${item}" 2>/dev/null \
              | python3 -c "${_pick_id}" 2>/dev/null || echo "")
            if [[ -z "${item_id}" ]]; then
              item_id=$(govc library.info -json "/${CONTENT_LIBRARY}/${item_stem}" 2>/dev/null \
                | python3 -c "${_pick_id}" 2>/dev/null || echo "")
            fi

            if [[ -n "${item_id}" && -n "${lib_id}" ]]; then
              item_dir="contentlib-${lib_id}/${item_id}"
              # List actual files in the item directory — vSphere may store
              # with original filename or a UUID-based name; don't assume.
              actual_file=$(govc datastore.ls -ds="${LIB_DATASTORE}" "${item_dir}/" 2>/dev/null \
                | grep -i '\.iso$' | head -1 || true)
              if [[ -n "${actual_file}" ]]; then
                rel="${item_dir}/${actual_file}"
                echo "  ${ver}: ${rel}"
                RESOLVED[$ver]="${rel}"
                echo "RESOLVED_ISO_${ver_key}=${rel}" >> "$GITHUB_ENV"
              else
                echo "  ${ver}: item dir found (${item_dir}) but no .iso file listed"
                echo "  ${ver}: datastore.ls output:"
                govc datastore.ls -ds="${LIB_DATASTORE}" "${item_dir}/" 2>&1 | sed 's/^/    /' || true
                echo "RESOLVED_ISO_${ver_key}=" >> "$GITHUB_ENV"
              fi
            else
              echo "  ${ver}: NOT FOUND (item_id='${item_id}' lib_id='${lib_id}')"
              echo "RESOLVED_ISO_${ver_key}=" >> "$GITHUB_ENV"
            fi
          done

          # Fail fast if the ISO for this matrix entry's version is missing
          if [[ -n "${ISO_ITEMS[$MATRIX_VERSION]:-}" && -z "${RESOLVED[$MATRIX_VERSION]:-}" ]]; then
            echo "❌ ${ISO_ITEMS[$MATRIX_VERSION]} not found — run the upload-isos workflow first (or upload the Windows ISO manually)"
            exit 1
          fi

      # ── Ensure vSphere VM folder exists ─────────────────────────────────────
      # govc folder.create is idempotent-ish but errors on existing folders.
      # We walk each path component and create it individually, swallowing
      # "already exists" errors with `|| true`. Nested paths (e.g. "a/b/c")
      # are handled by creating each level in turn.
      - name: Ensure vSphere VM folder exists
        env:
          GOVC_URL:        ${{ secrets.VSPHERE_SERVER }}
          GOVC_USERNAME:   ${{ secrets.VSPHERE_USER }}
          GOVC_PASSWORD:   ${{ secrets.VSPHERE_PASSWORD }}
          GOVC_INSECURE:   ${{ secrets.VSPHERE_INSECURE || 'false' }}
          GOVC_DATACENTER: ${{ secrets.VSPHERE_DATACENTER }}
          VSPHERE_FOLDER:  ${{ secrets.VSPHERE_FOLDER || 'packer' }}
        run: |
          current="/${GOVC_DATACENTER}/vm"
          IFS='/' read -ra parts <<< "${VSPHERE_FOLDER}"
          for part in "${parts[@]}"; do
            [[ -z "${part}" ]] && continue
            current="${current}/${part}"
            govc folder.create "${current}" 2>/dev/null || true
          done
          echo "✅ Folder path ensured: /${GOVC_DATACENTER}/vm/${VSPHERE_FOLDER}"

      # ── Install plugin ───────────────────────────────────────────────────────
      - name: Packer init (download vsphere plugin)
        run: packer init .

      # ── Write variables file from secrets ────────────────────────────────────
      # We write a temporary vars file rather than passing dozens of -var flags.
      # The file is removed in the cleanup step regardless of build success.
      - name: Write variables file
        run: |
          cat > runner.pkrvars.hcl << 'EOF'
          vsphere_server              = "${{ secrets.VSPHERE_SERVER }}"
          vsphere_user                = "${{ secrets.VSPHERE_USER }}"
          vsphere_password            = "${{ secrets.VSPHERE_PASSWORD }}"
          vsphere_insecure_connection = ${{ secrets.VSPHERE_INSECURE || 'false' }}
          vsphere_datacenter          = "${{ secrets.VSPHERE_DATACENTER }}"
          vsphere_cluster             = "${{ secrets.VSPHERE_CLUSTER }}"
          vsphere_host                = "${{ secrets.VSPHERE_HOST }}"
          vsphere_datastore           = "${{ secrets.VSPHERE_DATASTORE }}"
          vsphere_network             = "${{ secrets.VSPHERE_NETWORK }}"
          vsphere_folder              = "${{ secrets.VSPHERE_FOLDER }}"
          vsphere_iso_datastore       = "${{ env.ISO_BACKING_DATASTORE }}"
          build_username              = "${{ secrets.BUILD_USERNAME }}"
          build_password              = "${{ secrets.BUILD_PASSWORD }}"
          build_password_encrypted    = "${{ secrets.BUILD_PASSWORD_ENCRYPTED }}"
          ubuntu_2204_iso_path        = "${{ env.RESOLVED_ISO_2204 }}"
          ubuntu_2404_iso_path        = "${{ env.RESOLVED_ISO_2404 }}"
          ubuntu_2604_iso_path        = "${{ env.RESOLVED_ISO_2604 }}"
          admin_username              = "${{ secrets.ADMIN_USERNAME }}"
          admin_github_user           = "${{ secrets.ADMIN_GITHUB_USER }}"
          windows_admin_password      = "${{ secrets.WINDOWS_ADMIN_PASSWORD }}"
          windows_server_2022_iso_path = "${{ env.RESOLVED_ISO_WIN_SRV_2022 }}"
          windows_server_2025_iso_path = "${{ env.RESOLVED_ISO_WIN_SRV_2025 }}"
          windows_10_iso_path          = "${{ env.RESOLVED_ISO_WIN_10 }}"
          EOF
          # Optional Windows image-name overrides (fall back to variables.pkr.hcl
          # defaults when the secret is unset).
          if [[ -n "${{ secrets.WINDOWS_SERVER_2022_IMAGE_NAME }}" ]]; then
            echo 'windows_server_2022_image_name = "${{ secrets.WINDOWS_SERVER_2022_IMAGE_NAME }}"' >> runner.pkrvars.hcl
          fi
          if [[ -n "${{ secrets.WINDOWS_SERVER_2025_IMAGE_NAME }}" ]]; then
            echo 'windows_server_2025_image_name = "${{ secrets.WINDOWS_SERVER_2025_IMAGE_NAME }}"' >> runner.pkrvars.hcl
          fi
          if [[ -n "${{ secrets.WINDOWS_10_IMAGE_NAME }}" ]]; then
            echo 'windows_10_image_name = "${{ secrets.WINDOWS_10_IMAGE_NAME }}"' >> runner.pkrvars.hcl
          fi
          if [[ -n "${{ secrets.WINDOWS_TIMEZONE }}" ]]; then
            echo 'windows_timezone = "${{ secrets.WINDOWS_TIMEZONE }}"' >> runner.pkrvars.hcl
          fi
          # Strip leading whitespace added by the heredoc indentation
          sed -i 's/^[[:space:]]*//' runner.pkrvars.hcl

      # ── Validate ─────────────────────────────────────────────────────────────
      - name: Packer validate
        env:
          TMPDIR: /var/tmp
        run: |
          packer validate \
            -var-file=runner.pkrvars.hcl \
            -only="${{ matrix.only }}" \
            .

      # ── Build ────────────────────────────────────────────────────────────────
      # `-parallel-builds` controls how many sources Packer builds simultaneously
      # within this single Packer process. For combined "all" runs it's 2 (server
      # + desktop together); for single-target runs it's 1.
      - name: Packer build
        if: needs.resolve-targets.outputs.dry_run == 'false'
        env:
          PACKER_LOG: 1
          PACKER_LOG_PATH: packer-${{ matrix.label }}.log
          TMPDIR: /var/tmp   # /tmp is a small tmpfs; Packer writes CD images here
        run: |
          packer build \
            -var-file=runner.pkrvars.hcl \
            -only="${{ matrix.only }}" \
            -parallel-builds="${{ matrix.parallel }}" \
            -on-error=cleanup \
            -timestamp-ui \
            -force \
            .

      # ── Destroy orphaned VM on failure or cancellation ───────────────────────
      # Packer's -on-error=cleanup handles Packer-level errors but not GitHub
      # Actions cancellation. This step finds any VM matching the build name
      # pattern that was NOT converted to a template (i.e. the build did not
      # complete) and destroys it so vSphere is left clean.
      - name: Destroy orphaned VM
        if: cancelled() || failure()
        env:
          GOVC_URL:        ${{ secrets.VSPHERE_SERVER }}
          GOVC_USERNAME:   ${{ secrets.VSPHERE_USER }}
          GOVC_PASSWORD:   ${{ secrets.VSPHERE_PASSWORD }}
          GOVC_INSECURE:   ${{ secrets.VSPHERE_INSECURE || 'false' }}
          GOVC_DATACENTER: ${{ secrets.VSPHERE_DATACENTER }}
          NAME_PATTERN:    ${{ matrix.vm_glob }}
        run: |
          # vm_glob comes from the matrix entry (e.g. "ubuntu-2204-*",
          # "windows-server-2022-*"). The trailing "-*" matches the build_date
          # suffix on VM names.
          echo "Searching for orphaned VMs matching: ${NAME_PATTERN}"

          vms=$(govc find . -type m -name "${NAME_PATTERN}" 2>/dev/null || true)
          if [[ -z "${vms}" ]]; then
            echo "No VMs found matching '${NAME_PATTERN}' — nothing to clean up."
            exit 0
          fi

          _is_tpl='import sys,json;vms=(json.load(sys.stdin) or {}).get("VirtualMachines",[]);print("true" if vms and vms[0].get("Config",{}).get("Template",False) else "false")'

          while IFS= read -r vm_path; do
            [[ -z "${vm_path}" ]] && continue
            is_template=$(govc vm.info -json "${vm_path}" 2>/dev/null \
              | python3 -c "${_is_tpl}" 2>/dev/null || echo "unknown")
            if [[ "${is_template}" == "true" ]]; then
              echo "  Skipping (already a template): ${vm_path}"
            else
              echo "  Powering off and destroying: ${vm_path}"
              govc vm.power -off=true -force=true "${vm_path}" 2>/dev/null || true
              govc vm.destroy "${vm_path}"
              echo "  ✔ Destroyed: ${vm_path}"
            fi
          done <<< "${vms}"

      # ── Upload logs ──────────────────────────────────────────────────────────
      - name: Upload Packer log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: packer-log-${{ matrix.label }}-${{ github.run_number }}
          path: packer-${{ matrix.label }}.log
          retention-days: 30

      # The manifest filename is keyed on the build {} `name` attribute. The
      # matrix carries this as `manifest` so the same workflow handles both
      # the Ubuntu builds (manifests/ubuntu-2204.json etc.) and the Windows
      # builds (manifests/windows-server-2022.json etc.).
      - name: Upload build manifest
        if: success() && needs.resolve-targets.outputs.dry_run == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: manifest-${{ matrix.label }}-${{ github.run_number }}
          path: manifests/${{ matrix.manifest }}.json
          retention-days: 90

      # ── Slack notifications ──────────────────────────────────────────────────
      - name: Notify Slack — success
        if: success() && needs.resolve-targets.outputs.dry_run == 'false'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          [[ -z "${SLACK_WEBHOOK_URL}" ]] && { echo "SLACK_WEBHOOK_URL not set — skipping."; exit 0; }
          curl -fsSL -X POST "${SLACK_WEBHOOK_URL}" \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \"✅ *Packer build succeeded* — \`ubuntu-${{ matrix.label }}\`\",
              \"attachments\": [{
                \"color\": \"good\",
                \"fields\": [
                  { \"title\": \"Template\",    \"value\": \"ubuntu-${{ matrix.label }}\", \"short\": true },
                  { \"title\": \"Triggered by\", \"value\": \"${{ github.actor }}\",         \"short\": true },
                  { \"title\": \"Run\",
                    \"value\": \"<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|#${{ github.run_number }}>\",
                    \"short\": true }
                ]
              }]
            }"

      - name: Notify Slack — failure
        if: failure() || cancelled()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
        run: |
          [[ -z "${SLACK_WEBHOOK_URL}" ]] && { echo "SLACK_WEBHOOK_URL not set — skipping."; exit 0; }
          EMOJI="❌"
          [[ "${JOB_STATUS}" == "cancelled" ]] && EMOJI="⚠️"
          curl -fsSL -X POST "${SLACK_WEBHOOK_URL}" \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \"${EMOJI} *Packer build ${JOB_STATUS}* — \`ubuntu-${{ matrix.label }}\`\",
              \"attachments\": [{
                \"color\": \"danger\",
                \"fields\": [
                  { \"title\": \"Template\",    \"value\": \"ubuntu-${{ matrix.label }}\", \"short\": true },
                  { \"title\": \"Triggered by\", \"value\": \"${{ github.actor }}\",         \"short\": true },
                  { \"title\": \"Run\",
                    \"value\": \"<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|#${{ github.run_number }}>\",
                    \"short\": true }
                ]
              }]
            }"

      # ── Always clean up credentials ──────────────────────────────────────────
      - name: Remove variables file
        if: always()
        run: rm -f runner.pkrvars.hcl
