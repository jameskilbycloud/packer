name: Feature request
description: Suggest a new template, workflow change, or quality-of-life improvement.
title: "[feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. The repo is intentionally narrow in
        scope — Ubuntu LTS templates on vSphere — so additions need to
        pull weight. A short discussion before a large PR usually saves
        time.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: What's not working today, or what would be easier with this change?
      placeholder: |
        Currently the produced templates ship with passwordless sudo for
        the build user. We'd like a way to lock this down before the
        template is consumed.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      placeholder: |
        A "finalize" provisioner that runs last and removes the
        `90-packer-${build_username}` sudoers entry, optionally enabled
        via a `harden_for_clone` variable.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about and rejected.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Roughly how big do you think this is?
      options:
        - Small — single file, no new variables
        - Medium — multiple files, possibly a new workflow step
        - Large — new build target, new dependency, or major refactor
    validations:
      required: false
