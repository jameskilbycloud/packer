version: 2
updates:
  # GitHub Actions versions used in .github/workflows/*.yml. Dependabot opens
  # a PR for each updated action; review and merge as you'd handle any other
  # dependency bump. The Packer plugin pin in `packer.pkr.hcl` is hand-managed
  # because Dependabot has no native support for the HCL plugin block.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      # `include: "scope"` tells Dependabot to append the conventional-
      # commits scope (`(deps)`) automatically. The literal prefix must
      # therefore NOT pre-include `(deps)` — doing so produces
      # `chore(deps)(deps): bump ...` (see merged commit 55d6a98 for the
      # last PR title produced by that bug).
      prefix: "chore"
      include: "scope"
